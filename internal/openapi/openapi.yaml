components:
  schemas:
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          description: 业务状态码，失败为 0
          format: int64
          type: integer
        data:
          description: 失败时为 null
        error_code:
          description: 稳定的业务错误码
          type: string
        message_key:
          description: i18n 翻译 key
          type: string
        message_params:
          additionalProperties: {}
          description: i18n 模板参数
          type: object
        msg:
          description: 状态描述（回退文案）
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ReindexStatusResponse:
      additionalProperties: false
      properties:
        error:
          description: 失败原因（status=failed 时）
          type: string
        finished_at:
          description: 结束时间（Unix 秒）
          format: int64
          type: integer
        payload:
          description: "回填结果 BackfillResult: total/indexed/skipped/failed"
        phase:
          description: 当前阶段
          type: string
        started_at:
          description: 开始时间（Unix 秒）
          format: int64
          type: integer
        status:
          description: 作业状态：idle/pending/running/succeeded/failed/cancelled
          examples:
            - running
          type: string
      required:
        - status
      type: object
    ResultReindexStatusResponse:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/ReindexStatusResponse"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: Ech0 API 文档
  version: "1.0"
openapi: 3.1.0
paths:
  /embedding/reindex:
    post:
      description: 提交一次全量向量索引回填作业，起即返回（异步）。
      operationId: embedding-reindex
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 触发全量向量索引重建
      tags:
        - Embedding
  /embedding/reindex/cancel:
    post:
      description: 取消后返回最新状态（轮询收敛到 cancelled）。
      operationId: embedding-reindex-cancel
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 取消进行中的重建索引作业
      tags:
        - Embedding
  /embedding/reindex/status:
    get:
      description: 前端按类型轮询；查无作业行时返回 status=idle。
      operationId: embedding-reindex-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 查询重建索引作业状态
      tags:
        - Embedding
servers:
  - url: /api
