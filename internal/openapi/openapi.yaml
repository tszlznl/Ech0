            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取当前实例添加的所有连接
      tags:
        - Connect
  /connects:
    post:
      operationId: connect-add
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Connected"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:write
      summary: 添加连接
      tags:
        - Connect
  /connects/health:
    get:
      operationId: connect-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnectedHealth"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:read
      summary: 获取互联健康状态
      tags:
        - Connect
  /connects/info:
    get:
      operationId: connect-info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnect"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取所有已添加连接的详细信息
      tags:
        - Connect
  /connects/{id}:
    delete:
      operationId: connect-delete
      parameters:
        - description: 连接 ID（UUID）
          in: path
          name: id
          required: true
          schema:
            description: 连接 ID（UUID）
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:write
      summary: 删除连接
      tags:
        - Connect
  /echo:
    post:
      operationId: echo-create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EchoUpsertDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - echo:write
      summary: 创建新的 Echo
      tags:
