components:
  schemas:
    CheckUpdateResponse:
      additionalProperties: false
      properties:
        current_version:
          type: string
        has_update:
          type: boolean
        latest_version:
          type: string
      required:
        - current_version
        - latest_version
        - has_update
      type: object
    Connect:
      additionalProperties: false
      properties:
        logo:
          type: string
        server_name:
          type: string
        server_url:
          type: string
        sys_username:
          type: string
        today_echos:
          format: int64
          type: integer
        total_echos:
          format: int64
          type: integer
        version:
          type: string
      required:
        - server_name
        - server_url
        - logo
        - total_echos
        - today_echos
        - sys_username
        - version
      type: object
    Connected:
      additionalProperties: false
      properties:
        connect_url:
          type: string
        id:
          type: string
      required:
        - id
        - connect_url
      type: object
    ConnectedHealth:
      additionalProperties: false
      properties:
        connect_url:
          type: string
        id:
          type: string
        status:
          type: string
        version:
          type: string
      required:
        - id
        - connect_url
        - status
        - version
      type: object
    CreateExternalFileDto:
      additionalProperties: false
      properties:
        category:
          type: string
        content_type:
          type: string
        height:
          format: int64
          type: integer
        name:
          type: string
        url:
          type: string
        width:
          format: int64
          type: integer
      required:
        - url
        - content_type
        - category
        - width
        - height
        - name
      type: object
    DayStat:
      additionalProperties: false
      properties:
        date:
          type: string
        pv:
          format: int64
          type: integer
        uv:
          format: int64
          type: integer
      required:
        - date
        - pv
        - uv
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          description: 业务状态码，失败为 0
          format: int64
          type: integer
        data:
          description: 失败时为 null
        error_code:
          description: 稳定的业务错误码
          type: string
        message_key:
          description: i18n 翻译 key
          type: string
        message_params:
          additionalProperties: {}
          description: i18n 模板参数
          type: object
        msg:
          description: 状态描述（回退文案）
          type: string
      required:
        - code
        - msg
        - data
      type: object
    FileDto:
      additionalProperties: false
      properties:
        category:
          type: string
        content_type:
          type: string
        height:
          format: int64
          type: integer
        id:
          type: string
        key:
          type: string
        name:
          type: string
        size:
          format: int64
          type: integer
        storage_type:
          type: string
        url:
          type: string
        width:
          format: int64
          type: integer
      required:
        - id
        - key
        - url
      type: object
    FileListItemDto:
      additionalProperties: false
      properties:
        content_type:
          type: string
        created_at:
          format: int64
          type: integer
        id:
          type: string
        key:
          type: string
        name:
          type: string
        size:
          format: int64
          type: integer
        storage_type:
          type: string
        url:
          type: string
      required:
        - id
        - name
        - key
        - storage_type
        - url
        - created_at
      type: object
    FileListResultDto:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: "#/components/schemas/FileListItemDto"
          type:
            - array
            - "null"
        total:
          format: int64
          type: integer
      required:
        - total
        - items
      type: object
    FileTreeNodeDto:
      additionalProperties: false
