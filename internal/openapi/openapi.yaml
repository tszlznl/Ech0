info:
  title: Ech0 API 文档
  version: "1.0"
openapi: 3.1.0
paths:
  /connect:
    get:
      operationId: connect-self
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultConnect"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取当前实例的连接信息
      tags:
        - Connect
  /connect/list:
    get:
      operationId: connect-list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnected"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取当前实例添加的所有连接
      tags:
        - Connect
  /connects:
    post:
      operationId: connect-add
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Connected"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:write
      summary: 添加连接
      tags:
        - Connect
  /connects/health:
    get:
      operationId: connect-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnectedHealth"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:read
      summary: 获取互联健康状态
      tags:
        - Connect
  /connects/info:
    get:
      operationId: connect-info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnect"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取所有已添加连接的详细信息
      tags:
        - Connect
  /connects/{id}:
    delete:
      operationId: connect-delete
      parameters:
        - description: 连接 ID（UUID）
          in: path
          name: id
          required: true
          schema:
            description: 连接 ID（UUID）
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:write
      summary: 删除连接
      tags:
        - Connect
  /embedding/reindex:
    post:
      description: 提交一次全量向量索引回填作业，起即返回（异步）。
      operationId: embedding-reindex
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 触发全量向量索引重建
      tags:
        - Embedding
  /embedding/reindex/cancel:
    post:
      description: 取消后返回最新状态（轮询收敛到 cancelled）。
      operationId: embedding-reindex-cancel
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 取消进行中的重建索引作业
      tags:
        - Embedding
  /embedding/reindex/status:
    get:
      description: 前端按类型轮询；查无作业行时返回 status=idle。
      operationId: embedding-reindex-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 查询重建索引作业状态
      tags:
        - Embedding
  /file/tree:
    get:
      operationId: file-tree
      parameters:
        - description: 存储类型
          explode: false
          in: query
          name: storage_type
          required: true
          schema:
            description: 存储类型
            type: string
        - description: 路径前缀
          explode: false
          in: query
          name: prefix
          schema:
            description: 路径前缀
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultFileTreeResultDto"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:read
      summary: 获取文件树
      tags:
        - File
  /file/{id}:
    delete:
      operationId: file-delete
      parameters:
        - description: 文件 ID
          in: path
          name: id
          required: true
          schema:
            description: 文件 ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:write
      summary: 删除文件
      tags:
        - File
    get:
      operationId: file-get
      parameters:
        - description: 文件 ID
          in: path
          name: id
          required: true
          schema:
            description: 文件 ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
