          additionalProperties: {}
          type: object
        source_type:
          type: string
      required:
        - source_type
        - source_payload
      type: object
    Status:
      additionalProperties: false
      properties:
        initialized:
          type: boolean
        owner_exists:
          type: boolean
      required:
        - initialized
        - owner_exists
      type: object
    SystemSetting:
      additionalProperties: false
      properties:
        ICP_number:
          type: string
        allow_register:
          type: boolean
        custom_css:
          type: string
        custom_js:
          type: string
        default_locale:
          type: string
        footer_content:
          type: string
        footer_link:
          type: string
        meting_api:
          type: string
        server_logo:
          type: string
        server_name:
          type: string
        server_url:
          type: string
        site_title:
          type: string
      required:
        - site_title
        - server_logo
        - server_name
        - server_url
        - allow_register
        - default_locale
        - ICP_number
        - footer_content
        - footer_link
        - meting_api
        - custom_css
        - custom_js
      type: object
    SystemSettingDto:
      additionalProperties: false
      properties:
        ICP_number:
          type: string
        allow_register:
          type: boolean
        custom_css:
          type: string
        custom_js:
          type: string
        default_locale:
          type: string
        footer_content:
          type: string
        footer_link:
          type: string
        meting_api:
          type: string
        server_logo:
          type: string
        server_logo_file_id:
          type: string
        server_name:
          type: string
        server_url:
          type: string
        site_title:
          type: string
      required:
        - site_title
        - server_logo
        - server_logo_file_id
        - server_name
        - server_url
        - allow_register
        - default_locale
        - ICP_number
        - footer_content
        - footer_link
        - meting_api
        - custom_css
        - custom_js
      type: object
    Tag:
      additionalProperties: false
      properties:
        created_at:
          format: int64
          type: integer
        id:
          type: string
        name:
          type: string
        usage_count:
          format: int64
          type: integer
      required:
        - id
        - name
        - usage_count
        - created_at
      type: object
    TestEmailRequest:
      additionalProperties: false
      properties:
        setting:
          $ref: "#/components/schemas/ModelSystemSetting"
      required:
        - setting
      type: object
    UpdateCommentHotDto:
      additionalProperties: false
      properties:
        hot:
          type: boolean
      required:
        - hot
      type: object
    UpdateCommentStatusDto:
      additionalProperties: false
      properties:
        status:
          type: string
      required:
        - status
      type: object
    UpdateFileMetaDto:
      additionalProperties: false
      properties:
        content_type:
          type: string
        height:
          format: int64
          type: integer
        size:
          format: int64
          type: integer
        width:
          format: int64
          type: integer
      required:
        - size
      type: object
    User:
      additionalProperties: false
      properties:
        avatar:
          type: string
        email:
          type: string
        id:
          type: string
        is_admin:
          type: boolean
        is_owner:
          type: boolean
        locale:
          type: string
        username:
          type: string
      required:
        - id
        - username
        - email
        - is_admin
        - is_owner
        - avatar
        - locale
      type: object
    UserInfoDto:
      additionalProperties: false
      properties:
        avatar:
          type: string
        avatar_file_id:
          type: string
        email:
          type: string
        is_admin:
          type: boolean
        is_owner:
          type: boolean
        locale:
          type: string
        password:
          type: string
        username:
          type: string
      required:
        - username
        - password
        - email
        - is_admin
        - is_owner
        - avatar
        - avatar_file_id
        - locale
      type: object
    Webhook:
      additionalProperties: false
      properties:
        created_at:
          format: int64
          type: integer
        id:
          type: string
        is_active:
          type: boolean
        last_status:
          type: string
        last_trigger:
          format: int64
          type: integer
        name:
          type: string
        updated_at:
          format: int64
          type: integer
        url:
          type: string
      required:
        - id
        - name
        - url
        - is_active
        - last_status
        - last_trigger
        - created_at
        - updated_at
      type: object
    WebhookDto:
      additionalProperties: false
      properties:
        is_active:
          type: boolean
        name:
          type: string
        secret:
          type: string
        url:
          type: string
      required:
        - name
        - url
        - is_active
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: Ech0 API 文档
  version: "1.0"
openapi: 3.1.0
paths:
  /access-tokens:
    get:
      operationId: access-token-list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListAccessTokenSetting"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:token
      summary: 列出访问令牌
      tags:
        - Setting
    post:
      operationId: access-token-create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessTokenSettingDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultString"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:token
      summary: 创建访问令牌
      tags:
        - Setting
  /access-tokens/{id}:
    delete:
      operationId: access-token-delete
      parameters:
        - description: 资源 ID（UUID）
          in: path
          name: id
          required: true
          schema:
            description: 资源 ID（UUID）
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:token
      summary: 删除访问令牌
      tags:
        - Setting
  /agent/info:
    get:
      operationId: agent-info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultAgentSetting"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取 Agent 公开信息
      tags:
        - Setting
  /agent/recent:
    get:
      operationId: copilot-recent
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultString"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取作者近况的 AI 总结
      tags:
        - Copilot
  /agent/settings:
    get:
      operationId: agent-settings-get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultAgentSetting"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 获取 Agent 设置
      tags:
        - Setting
    put:
      operationId: agent-settings-update
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSettingDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 更新 Agent 设置
      tags:
        - Setting
  /agent/settings/test:
    post:
      operationId: agent-settings-test
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSettingDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 测试 Copilot 连接
      tags:
        - Setting
  /chat/session:
    delete:
      operationId: copilot-session-clear
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 清除持久化 Chat 会话
      tags:
        - Copilot
    get:
      operationId: copilot-session-get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListChatMessage"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 获取持久化 Chat 会话
      tags:
        - Copilot
  /comments:
    get:
      operationId: comment-list-by-echo
      parameters:
        - description: Echo ID
          explode: false
          in: query
          name: echo_id
          required: true
          schema:
            description: Echo ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListPublicComment"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 按 echo 列出公开评论
      tags:
        - Comment
    post:
      operationId: comment-create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultCreateCommentResult"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 创建公开评论
      tags:
        - Comment
  /comments/form:
    get:
      operationId: comment-form-meta
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultFormMeta"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取评论表单元信息
      tags:
        - Comment
  /comments/integration:
    post:
      operationId: comment-create-integration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntegrationCommentDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultCreateCommentResult"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - comment:write
      summary: 经访问令牌创建评论（集成）
      tags:
        - Comment
  /comments/public:
    get:
      operationId: comment-list-public
      parameters:
        - description: 返回数量上限
          explode: false
          in: query
          name: limit
          schema:
            default: 30
            description: 返回数量上限
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListPublicComment"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 列出最新公开评论
      tags:
        - Comment
  /connect:
    get:
      operationId: connect-self
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultConnect"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取当前实例的连接信息
      tags:
        - Connect
  /connect/list:
    get:
      operationId: connect-list
