components:
  schemas:
    Connect:
      additionalProperties: false
      properties:
        logo:
          type: string
        server_name:
          type: string
        server_url:
          type: string
        sys_username:
          type: string
        today_echos:
          format: int64
          type: integer
        total_echos:
          format: int64
          type: integer
        version:
          type: string
      required:
        - server_name
        - server_url
        - logo
        - total_echos
        - today_echos
        - sys_username
        - version
      type: object
    Connected:
      additionalProperties: false
      properties:
        connect_url:
          type: string
        id:
          type: string
      required:
        - id
        - connect_url
      type: object
    ConnectedHealth:
      additionalProperties: false
      properties:
        connect_url:
          type: string
        id:
          type: string
        status:
          type: string
        version:
          type: string
      required:
        - id
        - connect_url
        - status
        - version
      type: object
    ErrorBody:
      additionalProperties: false
      properties:
        code:
          description: 业务状态码，失败为 0
          format: int64
          type: integer
        data:
          description: 失败时为 null
        error_code:
          description: 稳定的业务错误码
          type: string
        message_key:
          description: i18n 翻译 key
          type: string
        message_params:
          additionalProperties: {}
          description: i18n 模板参数
          type: object
        msg:
          description: 状态描述（回退文案）
          type: string
      required:
        - code
        - msg
        - data
      type: object
    Heatmap:
      additionalProperties: false
      properties:
        count:
          format: int64
          type: integer
        date:
          type: string
      required:
        - date
        - count
      type: object
    HelloResponse:
      additionalProperties: false
      properties:
        author:
          type: string
        build_time:
          type: string
        commit:
          type: string
        copyright:
          type: string
        hello:
          type: string
        license:
          type: string
        repo_url:
          type: string
        version:
          type: string
      required:
        - hello
        - copyright
        - version
        - commit
        - build_time
        - license
        - author
        - repo_url
      type: object
    RegisterDto:
      additionalProperties: false
      properties:
        email:
          type: string
        locale:
          type: string
        password:
          type: string
        username:
          type: string
      required:
        - username
        - password
        - email
      type: object
    ReindexStatusResponse:
      additionalProperties: false
      properties:
        error:
          description: 失败原因（status=failed 时）
          type: string
        finished_at:
          description: 结束时间（Unix 秒）
          format: int64
          type: integer
        payload:
          description: "回填结果 BackfillResult: total/indexed/skipped/failed"
        phase:
          description: 当前阶段
          type: string
        started_at:
          description: 开始时间（Unix 秒）
          format: int64
          type: integer
        status:
          description: 作业状态：idle/pending/running/succeeded/failed/cancelled
          examples:
            - running
          type: string
      required:
        - status
      type: object
    ResultConnect:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/Connect"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultHelloResponse:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/HelloResponse"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultInterface {}:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data: {}
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultListConnect:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          items:
            $ref: "#/components/schemas/Connect"
          type:
            - array
            - "null"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultListConnected:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          items:
            $ref: "#/components/schemas/Connected"
          type:
            - array
            - "null"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultListConnectedHealth:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          items:
            $ref: "#/components/schemas/ConnectedHealth"
          type:
            - array
            - "null"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultListHeatmap:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          items:
            $ref: "#/components/schemas/Heatmap"
          type:
            - array
            - "null"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultListUser:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          items:
            $ref: "#/components/schemas/User"
          type:
            - array
            - "null"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultReindexStatusResponse:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/ReindexStatusResponse"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultStatus:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/Status"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultString:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          type: string
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultUser:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/User"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    Status:
      additionalProperties: false
      properties:
        initialized:
          type: boolean
        owner_exists:
          type: boolean
      required:
        - initialized
        - owner_exists
      type: object
    User:
      additionalProperties: false
      properties:
        avatar:
          type: string
        email:
          type: string
        id:
          type: string
        is_admin:
          type: boolean
        is_owner:
          type: boolean
        locale:
          type: string
        username:
          type: string
      required:
        - id
        - username
        - email
        - is_admin
        - is_owner
        - avatar
        - locale
      type: object
    UserInfoDto:
      additionalProperties: false
      properties:
        avatar:
          type: string
        avatar_file_id:
          type: string
        email:
          type: string
        is_admin:
          type: boolean
        is_owner:
          type: boolean
        locale:
          type: string
        password:
          type: string
        username:
          type: string
      required:
        - username
        - password
        - email
        - is_admin
        - is_owner
        - avatar
        - avatar_file_id
        - locale
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: Ech0 API 文档
  version: "1.0"
openapi: 3.1.0
paths:
  /connect:
    get:
      operationId: connect-self
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultConnect"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取当前实例的连接信息
      tags:
        - Connect
  /connect/list:
    get:
      operationId: connect-list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnected"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取当前实例添加的所有连接
      tags:
        - Connect
  /connects:
    post:
      operationId: connect-add
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Connected"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:write
      summary: 添加连接
      tags:
        - Connect
  /connects/health:
    get:
      operationId: connect-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnectedHealth"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:read
      summary: 获取互联健康状态
      tags:
        - Connect
  /connects/info:
    get:
      operationId: connect-info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnect"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取所有已添加连接的详细信息
      tags:
        - Connect
  /connects/{id}:
    delete:
      operationId: connect-delete
      parameters:
        - description: 连接 ID（UUID）
          in: path
          name: id
          required: true
          schema:
            description: 连接 ID（UUID）
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:write
      summary: 删除连接
      tags:
        - Connect
  /embedding/reindex:
    post:
      description: 提交一次全量向量索引回填作业，起即返回（异步）。
      operationId: embedding-reindex
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 触发全量向量索引重建
      tags:
        - Embedding
  /embedding/reindex/cancel:
    post:
      description: 取消后返回最新状态（轮询收敛到 cancelled）。
      operationId: embedding-reindex-cancel
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 取消进行中的重建索引作业
      tags:
        - Embedding
  /embedding/reindex/status:
    get:
      description: 前端按类型轮询；查无作业行时返回 status=idle。
      operationId: embedding-reindex-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 查询重建索引作业状态
      tags:
        - Embedding
  /heatmap:
    get:
      operationId: common-heatmap
      parameters:
        - description: 客户端时区（IANA 名），用于按本地日界对齐热力图
          in: header
          name: X-Timezone
          schema:
            description: 客户端时区（IANA 名），用于按本地日界对齐热力图
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListHeatmap"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取发布热力图
      tags:
        - Common
  /hello:
    get:
      operationId: common-hello
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultHelloResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: Hello / 版本信息
      tags:
        - Common
  /init/owner:
    post:
      description: 创建首个 Owner 账号（仅在未初始化时可用）。
      operationId: init-owner
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 初始化站点 Owner
      tags:
        - Init
  /init/status:
    get:
      description: 返回站点是否已初始化、是否已存在 Owner。
      operationId: init-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultStatus"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取系统初始化状态
      tags:
        - Init
  /register:
    post:
      operationId: user-register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 用户注册
      tags:
        - User
  /user:
    get:
      operationId: user-info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultUser"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - profile:read
      summary: 获取当前用户信息
      tags:
        - User
    put:
      operationId: user-update
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInfoDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - profile:write
      summary: 更新当前用户信息
      tags:
        - User
  /user/admin/{id}:
    put:
      operationId: user-set-admin
      parameters:
        - description: 用户 ID（UUID）
          in: path
          name: id
          required: true
          schema:
            description: 用户 ID（UUID）
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:user
      summary: 切换用户管理员权限
      tags:
        - User
  /user/{id}:
    delete:
      operationId: user-delete
      parameters:
        - description: 用户 ID（UUID）
          in: path
          name: id
          required: true
          schema:
            description: 用户 ID（UUID）
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:user
      summary: 删除用户
      tags:
        - User
  /users:
    get:
      operationId: user-list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListUser"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:user
      summary: 获取所有用户
      tags:
        - User
  /website/title:
    get:
      operationId: common-website-title
      parameters:
        - description: 目标网站 URL
          explode: false
          in: query
          name: website_url
          required: true
          schema:
            description: 目标网站 URL
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultString"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth: []
      summary: 获取目标网站标题
      tags:
        - Common
servers:
  - url: /api
