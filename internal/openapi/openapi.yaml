        content_type:
          type: string
        file_id:
          type: string
        has_children:
          type: boolean
        modified_at:
          format: int64
          type: integer
        name:
          type: string
        node_type:
          type: string
        path:
          type: string
        size:
          format: int64
          type: integer
      required:
        - name
        - path
        - node_type
        - has_children
      type: object
    FileTreeResultDto:
