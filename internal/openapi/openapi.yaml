        data:
          $ref: "#/components/schemas/PresignDto"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultReindexStatusResponse:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/ReindexStatusResponse"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultStatus:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/Status"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultString:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          type: string
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultSystemSetting:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/SystemSetting"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    ResultUser:
      additionalProperties: false
      properties:
        code:
          format: int64
          type: integer
        data:
          $ref: "#/components/schemas/User"
        error_code:
          type: string
        message_key:
          type: string
        message_params:
          additionalProperties: {}
          type: object
        msg:
          type: string
      required:
        - code
        - msg
        - data
      type: object
    SearchResult:
      additionalProperties: false
      properties:
        content:
          type: string
        distance:
          format: double
          type: number
        echo_created:
          format: int64
          type: integer
        echo_id:
          type: string
        extension:
          $ref: "#/components/schemas/EchoExtension"
        files:
          items:
            $ref: "#/components/schemas/File"
          type:
            - array
            - "null"
        username:
          type: string
      required:
        - echo_id
        - content
        - username
        - echo_created
        - distance
      type: object
    StartGlobalMigrationRequest:
      additionalProperties: false
      properties:
        source_payload:
          additionalProperties: {}
          type: object
        source_type:
          type: string
      required:
        - source_type
        - source_payload
      type: object
    Status:
      additionalProperties: false
      properties:
        initialized:
          type: boolean
        owner_exists:
          type: boolean
      required:
        - initialized
        - owner_exists
      type: object
    SystemSetting:
      additionalProperties: false
      properties:
        captcha_enabled:
          type: boolean
        email_notify:
          $ref: "#/components/schemas/EmailNotifySetting"
        enable_comment:
          type: boolean
        require_approval:
          type: boolean
      required:
        - enable_comment
        - require_approval
        - captcha_enabled
        - email_notify
      type: object
    TestEmailRequest:
      additionalProperties: false
      properties:
        setting:
          $ref: "#/components/schemas/SystemSetting"
      required:
        - setting
      type: object
    UpdateCommentHotDto:
      additionalProperties: false
      properties:
        hot:
          type: boolean
      required:
        - hot
      type: object
    UpdateCommentStatusDto:
      additionalProperties: false
      properties:
        status:
          type: string
      required:
        - status
      type: object
    UpdateFileMetaDto:
      additionalProperties: false
      properties:
        content_type:
          type: string
        height:
          format: int64
          type: integer
        size:
          format: int64
          type: integer
        width:
          format: int64
          type: integer
      required:
        - size
      type: object
    User:
      additionalProperties: false
      properties:
        avatar:
          type: string
        email:
          type: string
        id:
          type: string
        is_admin:
          type: boolean
        is_owner:
          type: boolean
        locale:
          type: string
        username:
          type: string
      required:
        - id
        - username
        - email
        - is_admin
        - is_owner
        - avatar
        - locale
      type: object
    UserInfoDto:
      additionalProperties: false
      properties:
        avatar:
          type: string
        avatar_file_id:
          type: string
        email:
          type: string
        is_admin:
          type: boolean
        is_owner:
          type: boolean
        locale:
          type: string
        password:
          type: string
        username:
          type: string
      required:
        - username
        - password
        - email
        - is_admin
        - is_owner
        - avatar
        - avatar_file_id
        - locale
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: Ech0 API 文档
  version: "1.0"
openapi: 3.1.0
paths:
  /agent/recent:
    get:
      operationId: copilot-recent
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultString"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取作者近况的 AI 总结
      tags:
        - Copilot
  /chat/session:
    delete:
      operationId: copilot-session-clear
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 清除持久化 Chat 会话
      tags:
        - Copilot
    get:
      operationId: copilot-session-get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListChatMessage"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 获取持久化 Chat 会话
      tags:
        - Copilot
  /comments:
    get:
      operationId: comment-list-by-echo
      parameters:
        - description: Echo ID
          explode: false
          in: query
          name: echo_id
          required: true
          schema:
            description: Echo ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListPublicComment"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 按 echo 列出公开评论
      tags:
        - Comment
    post:
      operationId: comment-create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultCreateCommentResult"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 创建公开评论
      tags:
        - Comment
  /comments/form:
    get:
      operationId: comment-form-meta
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultFormMeta"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取评论表单元信息
      tags:
        - Comment
  /comments/integration:
    post:
      operationId: comment-create-integration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIntegrationCommentDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultCreateCommentResult"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - comment:write
      summary: 经访问令牌创建评论（集成）
      tags:
        - Comment
  /comments/public:
    get:
      operationId: comment-list-public
      parameters:
        - description: 返回数量上限
          explode: false
          in: query
          name: limit
          schema:
            default: 30
            description: 返回数量上限
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListPublicComment"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 列出最新公开评论
      tags:
        - Comment
  /connect:
    get:
      operationId: connect-self
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultConnect"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取当前实例的连接信息
      tags:
        - Connect
  /connect/list:
    get:
      operationId: connect-list
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnected"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取当前实例添加的所有连接
      tags:
        - Connect
  /connects:
    post:
      operationId: connect-add
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Connected"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:write
      summary: 添加连接
      tags:
        - Connect
  /connects/health:
    get:
      operationId: connect-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnectedHealth"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:read
      summary: 获取互联健康状态
      tags:
        - Connect
  /connects/info:
    get:
      operationId: connect-info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListConnect"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取所有已添加连接的详细信息
      tags:
        - Connect
  /connects/{id}:
    delete:
      operationId: connect-delete
      parameters:
        - description: 连接 ID（UUID）
          in: path
          name: id
          required: true
          schema:
            description: 连接 ID（UUID）
            format: uuid
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - connect:write
      summary: 删除连接
      tags:
        - Connect
  /embedding/reindex:
    post:
      description: 提交一次全量向量索引回填作业，起即返回（异步）。
      operationId: embedding-reindex
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 触发全量向量索引重建
      tags:
        - Embedding
  /embedding/reindex/cancel:
    post:
      description: 取消后返回最新状态（轮询收敛到 cancelled）。
      operationId: embedding-reindex-cancel
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 取消进行中的重建索引作业
      tags:
        - Embedding
  /embedding/reindex/status:
    get:
      description: 前端按类型轮询；查无作业行时返回 status=idle。
      operationId: embedding-reindex-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultReindexStatusResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 查询重建索引作业状态
      tags:
        - Embedding
  /file/tree:
    get:
      operationId: file-tree
      parameters:
        - description: 存储类型
          explode: false
          in: query
          name: storage_type
          required: true
          schema:
            description: 存储类型
            type: string
        - description: 路径前缀
          explode: false
          in: query
          name: prefix
          schema:
            description: 路径前缀
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultFileTreeResultDto"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:read
      summary: 获取文件树
      tags:
        - File
  /file/{id}:
    delete:
      operationId: file-delete
      parameters:
        - description: 文件 ID
          in: path
          name: id
          required: true
          schema:
            description: 文件 ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:write
      summary: 删除文件
      tags:
        - File
    get:
      operationId: file-get
      parameters:
        - description: 文件 ID
          in: path
          name: id
          required: true
          schema:
            description: 文件 ID
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultFileDto"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:read
      summary: 获取文件元信息
      tags:
        - File
  /file/{id}/meta:
    put:
      operationId: file-update-meta
      parameters:
        - description: 文件 ID
          in: path
          name: id
          required: true
          schema:
            description: 文件 ID
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFileMetaDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultFileDto"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:write
      summary: 更新对象存储文件元信息
      tags:
        - File
  /files:
    get:
      operationId: file-list
      parameters:
        - description: 页码
          explode: false
          in: query
          name: page
          schema:
            description: 页码
            format: int64
            type: integer
        - description: 每页数量
          explode: false
          in: query
          name: pageSize
          schema:
            description: 每页数量
            format: int64
            type: integer
        - description: 搜索关键词
          explode: false
          in: query
          name: search
          schema:
            description: 搜索关键词
            type: string
        - description: 存储类型
          explode: false
          in: query
          name: storage_type
          schema:
            description: 存储类型
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultFileListResultDto"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:read
      summary: 分页获取文件列表
      tags:
        - File
  /files/external:
    post:
      operationId: file-external
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExternalFileDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultFileDto"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:write
      summary: 登记外链文件
      tags:
        - File
  /files/presign:
    put:
      operationId: file-presign
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetPresignURLDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultPresignDto"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - file:write
      summary: 获取对象存储直传预签名 URL
      tags:
        - File
  /heatmap:
    get:
      operationId: common-heatmap
      parameters:
        - description: 客户端时区（IANA 名），用于按本地日界对齐热力图
          in: header
          name: X-Timezone
          schema:
            description: 客户端时区（IANA 名），用于按本地日界对齐热力图
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultListHeatmap"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取发布热力图
      tags:
        - Common
  /hello:
    get:
      operationId: common-hello
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultHelloResponse"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: Hello / 版本信息
      tags:
        - Common
  /init/owner:
    post:
      description: 创建首个 Owner 账号（仅在未初始化时可用）。
      operationId: init-owner
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDto"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 初始化站点 Owner
      tags:
        - Init
  /init/status:
    get:
      description: 返回站点是否已初始化、是否已存在 Owner。
      operationId: init-status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultStatus"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      summary: 获取系统初始化状态
      tags:
        - Init
  /migration/cancel:
    post:
      operationId: migration-cancel
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultGlobalMigrationStateDTO"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 取消进行中的全局迁移
      tags:
        - Migration
  /migration/cleanup:
    post:
      operationId: migration-cleanup
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultInterface {}"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 清理迁移中间产物
      tags:
        - Migration
  /migration/export:
    post:
      operationId: migration-export
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResultExportStateDTO"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
          description: Error
      security:
        - bearerAuth:
            - admin:settings
      summary: 提交导出作业
      tags:
        - Migration
  /migration/export/cancel:
    post:
      operationId: migration-export-cancel
      responses:
        "200":
          content:
            application/json:
              schema:
