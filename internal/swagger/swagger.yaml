basePath: /api
definitions:
  handler.Response:
    properties:
      code:
        description: Code 状态码，非0时表示自定义HTTP业务状态码
        type: integer
      data:
        description: Data 响应数据，具体内容因接口而异
      msg:
        description: Msg 返回信息，通常是状态描述
        type: string
    type: object
  model.AccessTokenSetting:
    properties:
      created_at:
        description: 访问令牌创建时间，RFC3339 时间字符串
        type: string
      expiry:
        description: 指针类型，NULL 表示永不过期
        type: string
      id:
        description: 访问令牌 ID
        type: integer
      name:
        description: 访问令牌名称
        type: string
      token:
        description: 访问令牌
        type: string
      user_id:
        description: 创建该访问令牌的用户 ID
        type: integer
    type: object
  model.AccessTokenSettingDto:
    properties:
      expiry:
        description: 访问令牌过期策略（8_hours/1_month/never）
        type: string
      name:
        description: 访问令牌名称
        type: string
    type: object
  model.AgentSetting:
    properties:
      api_key:
        description: LLM API Key
        type: string
      base_url:
        description: 自定义 API URL（可选）
        type: string
      enable:
        description: 是否启用 Agent 功能
        type: boolean
      model:
        description: LLM 模型名称
        type: string
      prompt:
        description: Agent 额外使用的提示词
        type: string
      provider:
        description: LLM 提供商 （OpenAI、DeepSeek、Anthropic、Gemini、阿里百炼、Ollama等）
        type: string
    type: object
  model.AgentSettingDto:
    properties:
      api_key:
        description: LLM API Key
        type: string
      base_url:
        description: 自定义 API URL（可选）
        type: string
      enable:
        description: 是否启用 Agent 功能
        type: boolean
      model:
        description: LLM 模型名称
        type: string
      prompt:
        description: Agent 额外使用的提示词
        type: string
      provider:
        description: LLM 提供商 （OpenAI、DeepSeek、Anthropic、Gemini、阿里百炼、Ollama等）
        type: string
    type: object
  model.BackupSchedule:
    properties:
      cron_expression:
        description: 备份计划的 Cron 表达式
        type: string
      enable:
        description: 是否启用备份计划
        type: boolean
    type: object
  model.BackupScheduleDto:
    properties:
      cron_expression:
        description: 备份计划的 Cron 表达式
        type: string
      enable:
        description: 是否启用备份计划
        type: boolean
    type: object
  model.CommentProviderFieldMeta:
    properties:
      key:
        description: 字段键名
        type: string
      label:
        description: 字段名称
        type: string
      placeholder:
        description: 输入提示
        type: string
      required:
        description: 是否必填
        type: boolean
    type: object
  model.CommentProviderMeta:
    properties:
      fields:
        description: 字段定义
        items:
          $ref: '#/definitions/model.CommentProviderFieldMeta'
        type: array
      label:
        description: 展示名
        type: string
      provider:
        description: provider key
        type: string
    type: object
  model.CommentProviderMetaResponse:
    properties:
      providers:
        items:
          $ref: '#/definitions/model.CommentProviderMeta'
        type: array
    type: object
  model.CommentProviderSetting:
    properties:
      config:
        additionalProperties: true
        description: 提供者私有配置
        type: object
      css_url:
        description: 可选样式地址（为空则使用默认）
        type: string
      script_url:
        description: 可选脚本地址（为空则使用默认）
        type: string
    type: object
  model.CommentSetting:
    properties:
      enable_comment:
        description: 是否启用评论
        type: boolean
      provider:
        description: 当前启用的评论提供者
        type: string
      providers:
        additionalProperties:
          $ref: '#/definitions/model.CommentProviderSetting'
        description: 各评论提供者配置
        type: object
    type: object
  model.CommentSettingDto:
    properties:
      enable_comment:
        description: 是否启用评论
        type: boolean
      provider:
        description: 当前启用的评论提供者
        type: string
      providers:
        additionalProperties:
          $ref: '#/definitions/model.CommentProviderSetting'
        description: 各评论提供者配置
        type: object
    type: object
  model.Connected:
    properties:
      connect_url:
        description: 连接地址
        type: string
      id:
        type: integer
    type: object
  model.Echo:
    properties:
      content:
        type: string
      created_at:
        type: string
      extension:
        $ref: '#/definitions/model.EchoExtension'
      fav_count:
        type: integer
      id:
        type: integer
      images:
        items:
          $ref: '#/definitions/model.Image'
        type: array
      layout:
        type: string
      private:
        type: boolean
      tags:
        items:
          $ref: '#/definitions/model.Tag'
        type: array
      user_id:
        type: integer
      username:
        type: string
    type: object
  model.EchoUpsertDto:
    properties:
      content:
        type: string
      echo_files:
        items:
          type: object
        type: array
      extension:
        $ref: '#/definitions/model.EchoExtension'
      id:
        type: string
      layout:
        type: string
      private:
        type: boolean
      tags:
        items:
          $ref: '#/definitions/model.Tag'
        type: array
    type: object
  model.EchoExtension:
    properties:
      echo_id:
        type: string
      id:
        type: string
      payload:
        additionalProperties: true
        type: object
      type:
        type: string
    type: object
  model.GetPresignURLDto:
    properties:
      content_type:
        description: 文件的 MIME 类型
        type: string
      file_name:
        description: 原始文件名
        type: string
    required:
    - file_name
    type: object
  model.Image:
    properties:
      access_url:
        description: 可直接访问地址（前端渲染应优先使用）
        type: string
      height:
        description: 图片高度
        type: integer
      id:
        type: integer
      image_source:
        description: '图片来源: local/url/s3'
        type: string
      image_url:
        description: 图片URL
        type: string
      echo_id:
        description: 关联的 Echo ID
        type: integer
      object_key:
        description: 对象存储的Key (如果是本地存储则为空)
        type: string
      width:
        description: 图片宽度
        type: integer
    type: object
  model.ImageDto:
    properties:
      access_url:
        description: 可直接访问地址（前端渲染应优先使用）
        type: string
      height:
        description: 图片高度
        type: integer
      object_key:
        description: 对象存储的 Key, 用于删除 S3/R2 上的图片
        type: string
      source:
        type: string
      url:
        description: 图片的 URL 地址
        type: string
      width:
        description: 图片宽度
        type: integer
    required:
    - source
    - url
    type: object
  model.LoginDto:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.OAuth2Setting:
    properties:
      auth_url:
        description: OAuth2 授权 URL
        type: string
      client_id:
        description: OAuth2 Client ID
        type: string
      client_secret:
        description: OAuth2 Client Secret
        type: string
      enable:
        description: 是否启用 OAuth2 登录
        type: boolean
      provider:
        description: OAuth2 提供商
        type: string
      redirect_uri:
        description: OAuth2 重定向 URI
        type: string
      scopes:
        description: OAuth2 请求的权限范围
        items:
          type: string
        type: array
      token_url:
        description: OAuth2 令牌 URL
        type: string
      user_info_url:
        description: OAuth2 用户信息 URL
        type: string
    type: object
  model.OAuth2SettingDto:
    properties:
      auth_url:
        type: string
      client_id:
        type: string
      client_secret:
        type: string
      enable:
        type: boolean
      provider:
        type: string
      redirect_uri:
        type: string
      scopes:
        items:
          type: string
        type: array
      token_url:
        type: string
      user_info_url:
        type: string
    type: object
  model.OAuth2Status:
    properties:
      enabled:
        type: boolean
      oauth_ready:
        type: boolean
      provider:
        type: string
    type: object
  model.PasskeySetting:
    properties:
      webauthn_allowed_origins:
        items:
          type: string
        type: array
      webauthn_rp_id:
        type: string
    type: object
  model.PasskeySettingDto:
    properties:
      webauthn_allowed_origins:
        items:
          type: string
        type: array
      webauthn_rp_id:
        type: string
    type: object
  model.PasskeyStatus:
    properties:
      passkey_ready:
        type: boolean
    type: object
  model.PageQueryDto:
    properties:
      page:
        description: 页码，从1开始
        type: integer
      pageSize:
        description: 每页大小
        type: integer
      search:
        description: 用于搜索的关键字
        type: string
    type: object
  model.RegisterDto:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.S3Setting:
    properties:
      access_key:
        description: 访问密钥 ID
        type: string
      bucket_name:
        description: 存储桶名称
        type: string
      cdn_url:
        description: CDN 加速域名（可选，没有就走 Endpoint）
        type: string
      enable:
        description: 是否启用 S3 存储
        type: boolean
      endpoint:
        description: S3 端点
        type: string
      path_prefix:
        description: 存储路径前缀，例如 "uploads/"，方便隔离目录
        type: string
      provider:
        description: S3 服务提供商，例如 "aws", "r2", "minio", "other"
        type: string
      public_read:
        description: 上传时是否默认设置对象为 public-read
        type: boolean
      region:
        description: 区域
        type: string
      secret_key:
        description: 秘密访问密钥
        type: string
      use_ssl:
        description: 是否使用 SSL
        type: boolean
    type: object
  model.S3SettingDto:
    properties:
      access_key:
        description: 访问密钥 ID
        type: string
      bucket_name:
        description: 存储桶名称
        type: string
      cdn_url:
        description: CDN 加速域名（可选，没有就走 Endpoint）
        type: string
      enable:
        description: 是否启用 S3 存储
        type: boolean
      endpoint:
        description: S3 端点
        type: string
      path_prefix:
        description: 存储路径前缀，例如 "uploads/"，方便隔离目录
        type: string
      provider:
        description: S3 服务提供商，例如 "aws", "aliyun", "minio", "other"
        type: string
      public_read:
        description: 上传时是否默认设置对象为 public-read
        type: boolean
      region:
        description: 区域
        type: string
      secret_key:
        description: 秘密访问密钥
        type: string
      use_ssl:
        description: 是否使用 SSL
        type: boolean
    type: object
  model.SystemSetting:
    properties:
      ICP_number:
        description: 备案号
        type: string
      allow_register:
        description: 是否允许注册'
        type: boolean
      custom_css:
        description: 自定义 CSS
        type: string
      custom_js:
        description: 自定义 JS
        type: string
      meting_api:
        description: Meting API 地址
        type: string
      server_name:
        description: 服务器名称
        type: string
      server_url:
        description: 服务器地址
        type: string
      site_title:
        description: 站点标题
        type: string
    type: object
  model.SystemSettingDto:
    properties:
      ICP_number:
        description: 备案号
        type: string
      allow_register:
        description: 是否允许注册
        type: boolean
      custom_css:
        description: 自定义 CSS
        type: string
      custom_js:
        description: 自定义 JS
        type: string
      meting_api:
        description: Meting API 地址
        type: string
      server_name:
        description: 服务器名称
        type: string
      server_url:
        description: 服务器地址
        type: string
      site_title:
        description: 站点标题
        type: string
    type: object
  model.Tag:
    properties:
      created_at:
        description: 创建时间
        type: string
      id:
        type: integer
      name:
        description: 标签名称
        type: string
      usage_count:
        description: 使用计数
        type: integer
    type: object
  model.UserInfoDto:
    properties:
      avatar:
        description: |-
          头像地址
          example: https://example.com/avatar.png
        type: string
      is_admin:
        description: |-
          是否为管理员
          example: false
        type: boolean
      password:
        description: |-
          密码
          example: 123456
        type: string
      username:
        description: |-
          用户名
          example: linsnow
        type: string
    type: object
  model.Webhook:
    properties:
      created_at:
        description: 创建时间
        type: string
      id:
        description: Webhook ID
        type: integer
      is_active:
        description: 启用/禁用状态
        type: boolean
      last_status:
        description: 最近调用状态（如 success, failed）
        type: string
      last_trigger:
        description: 最近触发时间
        type: string
      name:
        description: Webhook 名称
        type: string
      secret:
        description: 签名密钥，用于请求验证（HMAC等）
        type: string
      updated_at:
        description: 更新时间
        type: string
      url:
        description: Webhook URL
        type: string
    type: object
  model.WebhookDto:
    properties:
      is_active:
        description: 启用/禁用状态
        type: boolean
      name:
        description: Webhook 名称
        type: string
      secret:
        description: 签名密钥，用于请求验证（HMAC等）
        type: string
      url:
        description: Webhook URL
        type: string
    type: object
host: localhost:6277
info:
  contact: {}
  description: 开源、自托管轻量级发布平台 Ech0 的 API 文档
  title: Ech0 API 文档
  version: "1.0"
paths:
  /access-tokens:
    get:
      consumes:
      - application/json
      description: 列出当前用户的所有访问令牌
      produces:
      - application/json
      responses:
        "200":
          description: 列出访问令牌失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 列出访问令牌
      tags:
      - 系统设置
    post:
      consumes:
      - application/json
      description: 为当前用户创建一个新的访问令牌
      parameters:
      - description: 新的访问令牌信息
        in: body
        name: accessToken
        required: true
        schema:
          $ref: '#/definitions/model.AccessTokenSettingDto'
      produces:
      - application/json
      responses:
        "200":
          description: 创建访问令牌失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 创建访问令牌
      tags:
      - 系统设置
  /access-tokens/{id}:
    delete:
      consumes:
      - application/json
      description: 根据 ID 删除指定的访问令牌
      parameters:
      - description: 要删除的访问令牌 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除访问令牌失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 删除访问令牌
      tags:
      - 系统设置
  /addConnect:
    post:
      consumes:
      - application/json
      description: 用户添加一个新的连接
      parameters:
      - description: 连接信息
        in: body
        name: connected
        required: true
        schema:
          $ref: '#/definitions/model.Connected'
      produces:
      - application/json
      responses:
        "200":
          description: 添加连接失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 添加连接
      tags:
      - 连接管理
  /agent/info:
    get:
      consumes:
      - application/json
      description: 获取系统的 Agent 信息
      produces:
      - application/json
      responses:
        "200":
          description: 获取 Agent 信息失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取 Agent 信息
      tags:
      - 系统设置
  /agent/settings:
    get:
      consumes:
      - application/json
      description: 获取系统的 Agent 相关设置
      produces:
      - application/json
      responses:
        "200":
          description: 获取 Agent 设置失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取 Agent 设置
      tags:
      - 系统设置
    put:
      consumes:
      - application/json
      description: 更新系统的 Agent 相关设置
      parameters:
      - description: 新的 Agent 设置
        in: body
        name: settings
        required: true
        schema:
          $ref: '#/definitions/model.AgentSettingDto'
      produces:
      - application/json
      responses:
        "200":
          description: 更新 Agent 设置失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 更新 Agent 设置
      tags:
      - 系统设置
  /allusers:
    get:
      consumes:
      - application/json
      description: 获取系统中所有用户的详细信息，接口需要认证
      produces:
      - application/json
      responses:
        "200":
          description: 获取失败，code=0，msg错误描述
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - ApiKeyAuth: []
      summary: 获取所有用户
      tags:
      - 用户管理
  /audios/delete:
    delete:
      consumes:
      - application/json
      description: 用户删除已上传的音频文件
      produces:
      - application/json
      responses:
        "200":
          description: 删除失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 删除音频
      tags:
      - 通用功能
  /audios/upload:
    post:
      consumes:
      - multipart/form-data
      description: 用户上传音频文件，成功后返回音频的访问 URL
      parameters:
      - description: 音频文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: 上传失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 上传音频
      tags:
      - 通用功能
  /backup/export:
    get:
      consumes:
      - application/json
      description: 用户导出备份文件，成功后触发文件下载
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 导出备份失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 导出数据备份
      tags:
      - 系统备份
  /backup/schedule:
    get:
      consumes:
      - application/json
      description: 获取系统的定期备份计划设置
      produces:
      - application/json
      responses:
        "200":
          description: 获取备份计划失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取备份计划
      tags:
      - 系统设置
    post:
      consumes:
      - application/json
      description: 为系统设置定期备份计划
      parameters:
      - description: 备份计划设置
        in: body
        name: backupSchedule
        required: true
        schema:
          $ref: '#/definitions/model.BackupScheduleDto'
      produces:
      - application/json
      responses:
        "200":
          description: 设置备份计划失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 更新备份计划
      tags:
      - 系统设置
  /comment/settings:
    get:
      consumes:
      - application/json
      description: 获取系统的评论相关设置
      produces:
      - application/json
      responses:
        "200":
          description: 获取评论设置失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取评论设置
      tags:
      - 系统设置
    put:
      consumes:
      - application/json
      description: 更新系统的评论相关设置
      parameters:
      - description: 新的评论设置
        in: body
        name: commentSettings
        required: true
        schema:
          $ref: '#/definitions/model.CommentSettingDto'
      produces:
      - application/json
      responses:
        "200":
          description: 更新评论设置失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 更新评论设置
      tags:
      - 系统设置
  /comment/providers/meta:
    get:
      consumes:
      - application/json
      description: 获取各评论服务提供者的动态字段定义
      produces:
      - application/json
      responses:
        "200":
          description: 获取评论提供者元数据失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取评论提供者元数据
      tags:
      - 系统设置
  /connect:
    get:
      consumes:
      - application/json
      description: 获取当前实例的连接详细信息
      produces:
      - application/json
      responses:
        "200":
