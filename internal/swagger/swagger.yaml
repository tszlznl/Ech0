basePath: /api
definitions:
  handler.Response:
    properties:
      code:
        description: Code 状态码，非0时表示自定义HTTP业务状态码
        type: integer
      data:
        description: Data 响应数据，具体内容因接口而异
      error_code:
        description: ErrorCode 业务错误码，可选
        type: string
      message_key:
        description: MessageKey 国际化消息 key，可选
        type: string
      message_params:
        additionalProperties: {}
        description: MessageParams 国际化模板参数，可选
        type: object
      msg:
        description: Msg 返回信息，通常是状态描述
        type: string
    type: object
  model.AccessTokenSettingDto:
    properties:
      audience:
        description: 访问令牌受众（public-client/cli/integration）
        type: string
      expiry:
        description: 访问令牌过期策略（8_hours/1_month/never）
        type: string
      name:
        description: 访问令牌名称
        type: string
      scopes:
        description: 访问令牌权限范围
        items:
          type: string
        type: array
    type: object
  model.AgentSettingDto:
    properties:
      api_key:
        description: LLM API Key
        type: string
      base_url:
        description: 自定义 API URL（可选）
        type: string
      enable:
        description: 是否启用 Agent 功能
        type: boolean
      model:
        description: LLM 模型名称
        type: string
      prompt:
        description: Agent 额外使用的提示词
        type: string
      provider:
        description: LLM 提供商 （OpenAI、DeepSeek、Anthropic、Gemini、阿里百炼、Ollama等）
        type: string
    type: object
  model.BackupScheduleDto:
    properties:
      cron_expression:
        description: 备份计划的 Cron 表达式
        type: string
      enable:
        description: 是否启用备份计划
        type: boolean
    type: object
  model.Connected:
    properties:
      connect_url:
        description: 连接地址
        type: string
      id:
        type: string
    type: object
  model.EchoExtensionDto:
    properties:
      payload:
        additionalProperties: true
        type: object
      type:
        type: string
    type: object
  model.EchoQueryDto:
    properties:
      page:
        type: integer
      pageSize:
        type: integer
      search:
        type: string
      sortBy:
        type: string
      sortOrder:
        type: string
      tagIds:
        items:
          type: string
        type: array
    type: object
  model.EchoUpsertDto:
    properties:
      content:
        type: string
      echo_files:
        items:
          type: object
        type: array
      extension:
        $ref: '#/definitions/model.EchoExtensionDto'
      id:
        type: string
      layout:
        type: string
      private:
        type: boolean
      tags:
        items:
          $ref: '#/definitions/model.Tag'
        type: array
    type: object
  model.LoginDto:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.OAuth2SettingDto:
    properties:
      auth_redirect_allowed_return_urls:
        items:
          type: string
        type: array
      auth_url:
        type: string
      client_id:
        type: string
      client_secret:
        type: string
      cors_allowed_origins:
        items:
          type: string
        type: array
      enable:
        type: boolean
      is_oidc:
        description: 是否启用 OIDC
        type: boolean
      issuer:
        description: OIDC 颁发者
        type: string
      jwks_url:
        description: OIDC JWKS URL
        type: string
      provider:
        type: string
      redirect_uri:
        type: string
      scopes:
        items:
          type: string
        type: array
      token_url:
        type: string
      user_info_url:
        type: string
    type: object
  model.PageQueryDto:
    properties:
      page:
        type: integer
      pageSize:
        type: integer
      search:
        type: string
    type: object
  model.PasskeySettingDto:
    properties:
      webauthn_allowed_origins:
        items:
          type: string
        type: array
      webauthn_rp_id:
        type: string
    type: object
  model.RegisterDto:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.S3SettingDto:
    properties:
      access_key:
        description: 访问密钥 ID
        type: string
      bucket_name:
        description: 存储桶名称
        type: string
      cdn_url:
        description: CDN 加速域名（可选，没有就走 Endpoint）
        type: string
      enable:
        description: 是否启用 S3 存储
        type: boolean
      endpoint:
        description: S3 端点
        type: string
      path_prefix:
        description: 存储路径前缀，例如 "uploads/"，方便隔离目录
        type: string
      provider:
        description: S3 服务提供商，例如 "aws", "aliyun", "minio", "other"
        type: string
      public_read:
        description: 上传时是否默认设置对象为 public-read
        type: boolean
      region:
        description: 区域
        type: string
      secret_key:
        description: 秘密访问密钥
        type: string
      use_ssl:
        description: 是否使用 SSL
        type: boolean
    type: object
  model.SystemSettingDto:
    properties:
      ICP_number:
        description: 备案号
        type: string
      allow_register:
        description: 是否允许注册
        type: boolean
      custom_css:
        description: 自定义 CSS
        type: string
      custom_js:
        description: 自定义 JS
        type: string
      default_locale:
        description: 站点默认语言（如 zh-CN / en-US）
        type: string
      footer_content:
        description: 自定义页脚内容
        type: string
      footer_link:
        description: 自定义页脚链接
        type: string
      meting_api:
        description: Meting API 地址
        type: string
      server_logo:
        description: 服务器Logo
        type: string
      server_logo_file_id:
        description: 服务器Logo文件ID（用于确认临时文件）
        type: string
      server_name:
        description: 服务器名称
        type: string
      server_url:
        description: 服务器地址
        type: string
      site_title:
        description: 站点标题
        type: string
    type: object
  model.Tag:
    properties:
      created_at:
        type: integer
      id:
        type: string
      name:
        type: string
      usage_count:
        type: integer
    type: object
  model.UpdateFileMetaDto:
    properties:
      content_type:
        type: string
      height:
        type: integer
      size:
        minimum: 0
        type: integer
      width:
        type: integer
    required:
    - size
    type: object
  model.UserInfoDto:
    properties:
      avatar:
        description: |-
          头像地址
          example: https://example.com/avatar.png
        type: string
      avatar_file_id:
        description: |-
          头像文件ID（用于确认临时文件转正）
          example: 0195e2a7-54a9-7bcf-8df5-6d81d671f5c7
        type: string
      email:
        description: |-
          邮箱
          example: owner@example.com
        type: string
      is_admin:
        description: |-
          是否为管理员
          example: false
        type: boolean
      is_owner:
        description: |-
          是否为Owner
          example: false
        type: boolean
      locale:
        description: |-
          语言偏好
          example: zh-CN
        type: string
      password:
        description: |-
          密码
          example: 123456
        type: string
      username:
        description: |-
          用户名
          example: linsnow
        type: string
    type: object
  model.WebhookDto:
    properties:
      is_active:
        description: 启用/禁用状态
        type: boolean
      name:
        description: Webhook 名称
        type: string
      secret:
        description: 签名密钥，用于请求验证（HMAC等）
        type: string
      url:
        description: Webhook URL
        type: string
    type: object
host: localhost:6277
info:
  contact: {}
  description: 开源、自托管轻量级发布平台 Ech0 的 API 文档
  title: Ech0 API 文档
  version: "1.0"
paths:
  /access-tokens:
    get:
      consumes:
      - application/json
      description: 列出当前用户的所有访问令牌
      produces:
      - application/json
      responses:
        "200":
          description: 列出访问令牌失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 列出访问令牌
      tags:
      - 系统设置
    post:
      consumes:
      - application/json
      description: 为当前用户创建一个新的访问令牌
      parameters:
      - description: 新的访问令牌信息
        in: body
        name: accessToken
        required: true
        schema:
          $ref: '#/definitions/model.AccessTokenSettingDto'
      produces:
      - application/json
      responses:
        "200":
          description: 创建访问令牌失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 创建访问令牌
      tags:
      - 系统设置
  /access-tokens/{id}:
    delete:
      consumes:
      - application/json
      description: 根据 ID 删除指定的访问令牌
      parameters:
      - description: 要删除的访问令牌 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除访问令牌失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 删除访问令牌
      tags:
      - 系统设置
  /agent/info:
    get:
      consumes:
      - application/json
      description: 获取系统的 Agent 信息
      produces:
      - application/json
      responses:
        "200":
          description: 获取 Agent 信息失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取 Agent 信息
      tags:
      - 系统设置
  /agent/recent:
    get:
      description: 获取 Agent 近期动态列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取近期动态
      tags:
      - 系统设置
  /agent/settings:
    get:
      consumes:
      - application/json
      description: 获取系统的 Agent 相关设置
      produces:
      - application/json
      responses:
        "200":
          description: 获取 Agent 设置失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取 Agent 设置
      tags:
      - 系统设置
    put:
      consumes:
      - application/json
      description: 更新系统的 Agent 相关设置
      parameters:
      - description: 新的 Agent 设置
        in: body
        name: settings
        required: true
        schema:
          $ref: '#/definitions/model.AgentSettingDto'
      produces:
      - application/json
      responses:
        "200":
          description: 更新 Agent 设置失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 更新 Agent 设置
      tags:
      - 系统设置
  /backup/export:
    get:
      consumes:
      - application/json
      description: 用户导出备份文件，成功后触发文件下载
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 导出备份失败
          schema:
            type: string
      summary: 导出数据备份
      tags:
      - 系统备份
  /backup/schedule:
    get:
      consumes:
      - application/json
      description: 获取系统的定期备份计划设置
      produces:
      - application/json
      responses:
        "200":
          description: 获取备份计划失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取备份计划
      tags:
      - 系统设置
    post:
      consumes:
      - application/json
      description: 为系统设置定期备份计划
      parameters:
      - description: 备份计划设置
        in: body
        name: backupSchedule
        required: true
        schema:
          $ref: '#/definitions/model.BackupScheduleDto'
      produces:
      - application/json
      responses:
        "200":
          description: 设置备份计划失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 更新备份计划
      tags:
      - 系统设置
  /backup/snapshot:
    post:
      consumes:
      - application/json
      description: 仅在服务端创建本地快照；若配置了 S3 则尝试上传（失败静默）
      produces:
      - application/json
      responses:
        "200":
          description: 创建快照失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 手动创建快照
      tags:
      - 系统备份
  /backup/snapshot/{taskId}:
    get:
      consumes:
      - application/json
      description: 根据 taskId 查询创建快照任务的执行状态
      produces:
      - application/json
      responses:
        "200":
          description: 查询快照状态失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 查询快照任务状态
      tags:
      - 系统备份
  /comments:
    get:
      description: 按动态 ID 获取评论列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取评论列表
      tags:
      - 评论
    post:
      consumes:
      - application/json
      description: 提交新评论
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 创建评论
      tags:
      - 评论
  /comments/form:
    get:
      description: 获取评论发布所需表单元数据
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取评论表单配置
      tags:
      - 评论
  /comments/integration:
    post:
      consumes:
      - application/json
      description: 供第三方集成平台（AI / 自动化）通过 access token 发布评论，免验证码与表单 token。需要 comment:write
        scope 与 integration audience。
      parameters:
      - description: Bearer <access_token>
        in: header
        name: Authorization
        required: true
        type: string
      - description: 请求体
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      summary: 集成评论
      tags:
      - 评论
  /comments/public:
    get:
      description: 获取公开评论流
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取公开评论
      tags:
      - 评论
  /connect:
    get:
      consumes:
      - application/json
      description: 获取当前实例的连接详细信息
      produces:
      - application/json
      responses:
        "200":
          description: 获取连接信息失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取当前实例的连接信息
      tags:
      - 连接管理
  /connect/list:
    get:
      consumes:
      - application/json
      description: 获取当前实例添加的所有连接列表
      produces:
      - application/json
      responses:
        "200":
          description: 获取连接列表失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取所有连接
      tags:
      - 连接管理
  /connects:
    post:
      consumes:
      - application/json
      description: 用户添加一个新的连接
      parameters:
      - description: 连接信息
        in: body
        name: connected
        required: true
        schema:
          $ref: '#/definitions/model.Connected'
      produces:
      - application/json
      responses:
        "200":
          description: 添加连接失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 添加连接
      tags:
      - 连接管理
  /connects/{id}:
    delete:
      consumes:
      - application/json
      description: 用户根据ID删除一个已添加的连接
      parameters:
      - description: 连接ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 删除连接失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 删除连接
      tags:
      - 连接管理
  /connects/info:
    get:
      consumes:
      - application/json
      description: 获取当前用户所有已添加的连接的详细信息
      produces:
      - application/json
      responses:
        "200":
          description: 获取连接信息失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取所有添加的连接信息
      tags:
      - 连接管理
  /echo:
    post:
      consumes:
      - application/json
      description: 用户创建一条新的Echo动态
      parameters:
      - description: Echo内容
        in: body
        name: echo
        required: true
        schema:
          $ref: '#/definitions/model.EchoUpsertDto'
      produces:
      - application/json
      responses:
        "200":
          description: 创建失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 创建新的Echo
      tags:
      - Echo
    put:
      consumes:
      - application/json
      description: 更新指定的Echo动态内容
      parameters:
      - description: 要更新的Echo内容
        in: body
        name: echo
        required: true
        schema:
          $ref: '#/definitions/model.EchoUpsertDto'
      produces:
      - application/json
      responses:
        "200":
          description: 更新失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 更新Echo
      tags:
      - Echo
  /echo/{id}:
    delete:
      consumes:
      - application/json
      description: 根据ID删除指定的Echo动态
      parameters:
      - description: Echo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 删除Echo
      tags:
      - Echo
    get:
      consumes:
      - application/json
      description: 根据ID获取指定的Echo动态详情
      parameters:
      - description: Echo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取指定ID的Echo
      tags:
      - Echo
  /echo/hot:
    get:
      consumes:
      - application/json
      description: 从最近发布的动态池中按「点赞数 + 已审核评论数×2」计算热度并排序，返回前若干条 Echo。需走认证路由（无有效 token
        时按匿名处理）；管理员可包含私有 Echo。查询参数 limit 为可选正整数，默认 5，服务端最大返回 20 条；无效或非正整数时使用默认值。
      parameters:
      - description: 返回条数，默认 5，最大 20
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取热门 Echo 列表
      tags:
      - Echo
  /echo/like/{id}:
    put:
      consumes:
      - application/json
      description: 根据ID为指定的Echo动态点赞
      parameters:
      - description: Echo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 点赞失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 点赞Echo
      tags:
      - Echo
  /echo/page:
    get:
      consumes:
      - application/json
      description: 'Deprecated: 请使用 POST /echo/query 替代。获取Echo列表，支持分页，兼容 GET Query
        和 POST JSON 请求'
      parameters:
      - description: 页码（GET方式）
        in: query
        name: page
        type: integer
      - description: 每页数量（GET方式）
        in: query
        name: pageSize
        type: integer
      - description: 分页参数（POST方式）
        in: body
        name: body
        schema:
          $ref: '#/definitions/model.PageQueryDto'
      produces:
      - application/json
      responses:
        "200":
          description: 获取失败
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 获取Echo列表（分页）[Deprecated]
      tags:
      - Echo
    post:
      consumes:
      - application/json
      description: 'Deprecated: 请使用 POST /echo/query 替代。获取Echo列表，支持分页，兼容 GET Query
        和 POST JSON 请求'
      parameters:
      - description: 页码（GET方式）
        in: query
        name: page
        type: integer
      - description: 每页数量（GET方式）
        in: query
        name: pageSize
        type: integer
      - description: 分页参数（POST方式）
        in: body
        name: body
        schema:
