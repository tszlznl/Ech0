<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ech0 — Social Preview</title>
<style>
  /*
    Ech0 GitHub social preview source.

    Design canvas: 1280 x 640 (GitHub's recommended ratio).
    Open this file in a browser, set viewport to 1280x640, and capture.

    Referenced assets (relative paths):
      - ../../web/public/Ech0.svg         (brand mark)
      - ../imgs/screenshot.png            (timeline view, macOS chrome included)
      - ../imgs/screenshot_dashboard.png  (admin dashboard, macOS chrome included)
  */

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
                 "Helvetica Neue", "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #1a1a1a;
  }

  .canvas {
    width: 1280px;
    height: 640px;
    position: relative;
    display: flex;
    align-items: center;
    background: linear-gradient(135deg,
      #FFF8EC 0%, #FFF4E4 55%, #FFEAD0 100%);
    overflow: hidden;
  }

  /* subtle dotted texture, fading toward bottom-right */
  .canvas::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(245, 74, 0, 0.07) 1.2px, transparent 1.2px);
    background-size: 28px 28px;
    mask-image: linear-gradient(135deg, rgba(0,0,0,0.7), transparent 60%);
    -webkit-mask-image: linear-gradient(135deg, rgba(0,0,0,0.7), transparent 60%);
    pointer-events: none;
  }

  /* brand-orange accent dots echoing the logo language */
  .accent-dot {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #F54A00;
    box-shadow: 0 0 0 6px rgba(245, 74, 0, 0.12);
    z-index: 3;
  }
  .accent-dot.tl { top: 70px;  left: 88px; }
  .accent-dot.br { bottom: 60px; right: 80px; opacity: 0.45; }

  /* ─── left column: brand + headline + tags + footer ─── */
  .left {
    width: 580px;
    padding: 56px 0 48px 96px;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 640px;
  }
  .left .spacer { flex: 1; }

  .brand-row {
    display: flex; align-items: center; gap: 18px;
    margin-bottom: 28px;
  }
  .brand-row .logo {
    width: 60px; height: 60px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(140, 70, 0, 0.12);
  }
  .brand-row .name {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  h1 {
    font-size: 64px;
    line-height: 1.08;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: #111;
    margin-bottom: 18px;
  }
  h1 .accent { color: #F54A00; }

  .sub {
    font-size: 20px;
    line-height: 1.5;
    color: #5a4a3a;
    font-weight: 500;
    max-width: 460px;
    margin-bottom: 24px;
  }

  .tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    padding: 7px 13px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(0, 0, 0, 0.08);
    font-size: 14px;
    font-weight: 600;
    color: #2a2a2a;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }
  .tag.primary {
    background: #111;
    color: #FFF4E4;
    border-color: #111;
  }
  .tag .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #F54A00;
    margin-right: 8px;
    vertical-align: 2px;
  }

  .footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    color: #6a5544;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .footer .repo { color: #2a2a2a; }

  /* ─── right column: stacked screenshots, no bounding frames ─── */
  .right {
    flex: 1;
    height: 100%;
    position: relative;
  }

  .shot {
    position: absolute;
    height: auto;
    width: auto;
    /* drop-shadow follows the image's actual shape (not a bounding box),
       so screenshot edges aren't clipped by any frame */
    filter:
      drop-shadow(0 22px 36px rgba(120, 60, 0, 0.22))
      drop-shadow(0 6px 12px rgba(120, 60, 0, 0.14));
    /* Quality hints — without these, rotate + drop-shadow rasterize the
       image into a low-quality compositor layer at 1x DPI and look soft. */
    image-rendering: -webkit-optimize-contrast;
    image-rendering: high-quality;
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* dashboard sits behind, tilted right */
  .shot.dashboard {
    top: 70px;
    right: -10px;
    max-width: 460px;
    max-height: 300px;
    transform: rotate(4deg);
    z-index: 1;
  }

  /* timeline sits in front, tilted left, overlapping the dashboard */
  .shot.timeline {
    top: 200px;
    left: 30px;
    max-width: 360px;
    max-height: 360px;
    transform: rotate(-3deg);
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="canvas">
    <span class="accent-dot tl"></span>
    <span class="accent-dot br"></span>

    <div class="left">
      <div class="brand-row">
        <img class="logo" src="../../web/public/Ech0.svg" alt="Ech0" />
        <span class="name">Ech0</span>
      </div>

      <h1>Your thoughts.<br/><span class="accent">Your server.</span></h1>
      <p class="sub">A self-hosted timeline,<br/>shipped as a single Go binary.</p>

      <div class="tags">
        <span class="tag primary"><span class="dot"></span>Self-hosted</span>
        <span class="tag">Single Binary</span>
        <span class="tag">AGPL-3.0</span>
        <span class="tag">Go · Vue 3</span>
      </div>

      <div class="spacer"></div>

      <div class="footer">
        <span class="repo">lin-snow/Ech0</span>
      </div>
    </div>

    <div class="right">
      <img class="shot dashboard" src="../imgs/screenshot_dashboard.png" alt="Ech0 admin dashboard" />
      <img class="shot timeline"  src="../imgs/screenshot.png"           alt="Ech0 timeline" />
    </div>
  </div>
</body>
</html>
