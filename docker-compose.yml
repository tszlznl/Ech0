version: "3"
services:
  ech0:
    image: sn0wl1n/ech0:latest
    container_name: ech0
    ports:
      - "6277:6277"
      # - "6278:6278"
    volumes:
      - ./ech0/data:/app/data
    environment:
      - JWT_SECRET="Hello Echos"
      # Optional: set your local timezone for date-based statistics
      # - TZ=Asia/Shanghai
      # - TZ=Asia/Tokyo
      # - TZ=Europe/Berlin
      # - TZ=America/New_York
      # - TZ=UTC
