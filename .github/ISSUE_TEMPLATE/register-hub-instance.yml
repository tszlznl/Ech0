name: 🌐 Join Ech0 Hub
description: 将你的公开 Ech0 实例登记到 hub.ech0.app 的聚合列表（由机器人自动发起 PR 更新 hub.json）
title: "🌐 [Hub] Register instance"
labels:
  - hub
body:
  - type: markdown
    attributes:
      value: |
        欢迎加入 Ech0 Hub!

        提交前请先确认下面 4 件事（都满足后基本就能顺利通过）：

        - 你的实例是**公开可访问**的（别人能通过网址打开）。
        - 你的 Ech0 版本是 **4.4.0 或更高**（低于 4.4.0 无法被 Hub 聚合）。
        - 你的实例已允许 Hub 跨域访问（CORS 允许 `https://hub.ech0.app`；本地调试可再加 `http://localhost:5173`）。
        - 下面填写的 **Instance ID** 只用小写字母、数字、连字符（例如 `my-echo`），并且在 Hub 中不重复。

        提交后会自动创建一个 PR 来更新 `hub/public/hub.json`，维护者合并后你的实例就会出现在 Hub 列表中。

  - type: input
    id: instance_id
    attributes:
      label: Instance ID
      description: 给你的实例起一个简短唯一的名字（仅小写字母/数字/连字符），例如 my-echo。
      placeholder: my-echo
    validations:
      required: true

  - type: input
    id: instance_url
    attributes:
      label: Instance URL
      description: 你的实例访问地址（以 https:// 开头，不要以 / 结尾），例如 https://echo.example.com。
      placeholder: https://echo.example.com
    validations:
      required: true
