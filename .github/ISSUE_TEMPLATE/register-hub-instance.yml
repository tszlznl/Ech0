name: Join Ech0 Hub
description: 将你的公开 Ech0 实例登记到 hub.ech0.app 的聚合列表（由机器人自动发起 PR 更新 hub.json）
title: "[Hub] Register instance"
labels:
  - hub
body:
  - type: markdown
    attributes:
      value: |
        提交前请确认：

        - 实例已**公网可访问**，且 API 根地址可拼出 `{url}/api/echo/query`。
        - 已为 Hub 配置 **CORS**，允许来源 `https://hub.ech0.app`（本地调试时另需允许 `http://localhost:5173`）。
        - **Instance ID** 仅用小写字母、数字与连字符，在 Hub 内全局唯一。

        合并 PR 后，部署的 Hub 会读取本仓库根目录下的 `hub/public/hub.json`。

  - type: input
    id: instance_id
    attributes:
      label: Instance ID
      description: Hub 内唯一短标识，例如 my-echo、team-cn。
      placeholder: my-echo
    validations:
      required: true

  - type: input
    id: instance_url
    attributes:
      label: Instance URL
      description: 实例 API 根地址，不要末尾斜杠。须为 https。
      placeholder: https://echo.example.com
    validations:
      required: true
