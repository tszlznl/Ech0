name: ✨ Feature Request
description: Propose a new feature or enhancement for Ech0.
title: "✨ [Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. For open-ended discussion or "what do you think about..." topics, prefer **GitHub Discussions**. Use this template when the request is concrete enough to scope and implement.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user problem or limitation does this solve? Who is affected?
      placeholder: As a self-hosted user, I cannot ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature. UI sketches, API shape, or config knobs are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why this one is preferable.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Backend / API
        - Frontend / UI
        - Auth / Access tokens
        - Storage (local / S3)
        - Webhook / Agent / Events
        - Migration / Backup
        - Hub / Connect
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, related issues, screenshots, or examples from other tools.

  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true
        - label: I am willing to discuss scope and trade-offs before implementation begins.
          required: false
        - label: I would like to implement this myself (optional).
          required: false
