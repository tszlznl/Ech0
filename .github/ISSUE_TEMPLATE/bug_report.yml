name: Bug Report
description: Report a reproducible problem in Ech0 (backend, frontend, or deployment).
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much as you can — the more reproducible the report, the faster it gets fixed.

        Before submitting:
        - Search existing issues to avoid duplicates.
        - For security vulnerabilities, **do not** open a public issue — see `SECURITY.md`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-paragraph description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. Include any sample data or curl/HTTP requests if relevant.
      placeholder: |
        1. Start the server with `make run`
        2. POST `/api/echo` with body `...`
        3. Open `/` in the browser
        4. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste error messages, stack traces, or screenshots if helpful.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Ech0 version
      description: Output of `ech0 version`, the Docker image tag, or commit SHA.
      placeholder: v4.4.0 / docker:latest / commit abcdef0
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Binary (go build / make run)
        - Docker
        - Docker Compose
        - Built from source (dev)
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Backend / API
        - Frontend / UI
        - Auth / Access tokens
        - Storage (local / S3)
        - Webhook / Agent / Events
        - Migration / Backup
        - Hub / Connect
        - Docs
        - Other
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, browser (for UI bugs), Go version if building from source.
      placeholder: macOS 14.5 / Chrome 124 / Go 1.26.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / config
      description: Paste server logs or relevant `ECH0_*` env vars. Redact secrets (JWT, S3 keys, tokens).
      render: shell

  - type: checkboxes
    id: confirm
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I have redacted any secrets from logs and config above.
          required: true
