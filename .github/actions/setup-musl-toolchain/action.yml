name: Setup musl toolchain
description: Restore/download aarch64 musl cross toolchain with cache

inputs:
  toolchain-version:
    description: Toolchain release version tag
    required: false
    default: "2025-6-20"
  archive-name:
    description: Toolchain archive name
    required: false
    default: "aarch64-linux-musl-cross.tgz"
  archive-base-url:
    description: Base URL for toolchain release assets
    required: false
    default: "https://github.com/lin-snow/musl-compilers/releases/download"
  archive-sha256:
    description: Expected sha256 checksum for archive (optional)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Compute toolchain paths
      id: paths
      shell: bash
      run: |
        set -euo pipefail
        toolchain_root="${GITHUB_WORKSPACE}/.toolchains"
        archive_basename="${{ inputs.archive-name }}"
        toolchain_dir="${archive_basename%.tgz}"
        archive_url="${{ inputs.archive-base-url }}/${{ inputs.toolchain-version }}/${archive_basename}"
        echo "toolchain_root=${toolchain_root}" >> "$GITHUB_OUTPUT"
        echo "toolchain_dir=${toolchain_dir}" >> "$GITHUB_OUTPUT"
        echo "archive_url=${archive_url}" >> "$GITHUB_OUTPUT"

    - name: Restore cached toolchain
      id: restore-musl-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.paths.outputs.toolchain_root }}/${{ steps.paths.outputs.toolchain_dir }}
        key: ${{ runner.os }}-musl-${{ inputs.toolchain-version }}-${{ inputs.archive-sha256 != '' && inputs.archive-sha256 || 'no-sha256' }}

    - name: Download and extract toolchain
      if: steps.restore-musl-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ steps.paths.outputs.toolchain_root }}"
        cd "${{ steps.paths.outputs.toolchain_root }}"
        archive_name="${{ inputs.archive-name }}"
        archive_url="${{ steps.paths.outputs.archive_url }}"

        curl -fL --retry 5 --retry-all-errors --connect-timeout 15 --max-time 300 \
          -o "${archive_name}" "${archive_url}"

        if [ -n "${{ inputs.archive-sha256 }}" ]; then
          echo "${{ inputs.archive-sha256 }}  ${archive_name}" | sha256sum -c -
        else
          echo "archive-sha256 is empty, skipping checksum verification"
        fi

        tar -xzf "${archive_name}"
        rm -f "${archive_name}"
        test -x "${{ steps.paths.outputs.toolchain_root }}/${{ steps.paths.outputs.toolchain_dir }}/bin/aarch64-linux-musl-gcc"

    - name: Save toolchain cache
      if: steps.restore-musl-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.paths.outputs.toolchain_root }}/${{ steps.paths.outputs.toolchain_dir }}
        key: ${{ steps.restore-musl-cache.outputs.cache-primary-key }}

    - name: Add toolchain to PATH
      shell: bash
      run: |
        set -euo pipefail
        toolchain_bin="${{ steps.paths.outputs.toolchain_root }}/${{ steps.paths.outputs.toolchain_dir }}/bin"
        echo "${toolchain_bin}" >> "$GITHUB_PATH"
        # GITHUB_PATH only takes effect in subsequent steps; export for current-step verification.
        export PATH="${toolchain_bin}:${PATH}"
        test -x "${toolchain_bin}/aarch64-linux-musl-gcc"
        command -v aarch64-linux-musl-gcc
