name: Release with Embedded Frontend

on:
  push:
    tags:
      - "v*" # 触发条件：打 Tag，比如 v1.0.0

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARM64_TOOLCHAIN: "zigcc" # options: zigcc | musl
  ZIG_VERSION: "latest"
  MUSL_TOOLCHAIN_VERSION: "2025-6-20"
  MUSL_TOOLCHAIN_ARCHIVE: "aarch64-linux-musl-cross.tgz"
  MUSL_TOOLCHAIN_SHA256: ""

jobs:
  build:
    name: Build Frontend & Backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # --- Frontend Build Steps ---
      - name: Setup Node.js Environment
        uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"
      - name: Install dependencies and build frontend
        working-directory: ./web
        run: pnpm install --frozen-lockfile && pnpm build --mode production

      # --- Backend Build Steps ---
      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache-dependency-path: "**/go.sum"
      - name: Set Go proxy
        run: go env -w GOPROXY=https://proxy.golang.org,direct

      - name: Setup Zig for ARM64 Cross-compilation
        if: matrix.goarch == 'arm64' && env.ARM64_TOOLCHAIN == 'zigcc'
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Musl for ARM64 Cross-compilation (fallback)
        if: matrix.goarch == 'arm64' && env.ARM64_TOOLCHAIN == 'musl'
        uses: ./.github/actions/setup-musl-toolchain
        with:
          toolchain-version: ${{ env.MUSL_TOOLCHAIN_VERSION }}
          archive-name: ${{ env.MUSL_TOOLCHAIN_ARCHIVE }}
          archive-sha256: ${{ env.MUSL_TOOLCHAIN_SHA256 }}

      - name: Build backend binary with embedded frontend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          ARM64_TOOLCHAIN: ${{ env.ARM64_TOOLCHAIN }}
        run: |
          set -euo pipefail
          # Define linker flags for a static build + inject commit / build time so /hello returns the real values.
          GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION_PKG="github.com/lin-snow/ech0/internal/version"
          STATIC_LDFLAGS="-linkmode external -extldflags '-static' -X ${VERSION_PKG}.Commit=${GIT_COMMIT} -X ${VERSION_PKG}.BuildTime=${BUILD_TIME}"
          OUTPUT_NAME="ech0-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            if [ "${ARM64_TOOLCHAIN}" = "zigcc" ]; then
              export CC="zig cc -target aarch64-linux-musl"
              export CXX="zig c++ -target aarch64-linux-musl"
            else
              export CC="aarch64-linux-musl-gcc"
            fi
          else
            export CC="gcc"
          fi

          # Build the binary. Go's 'embed' will automatically find the frontend
          # files built in the previous steps.
          test -f cmd/ech0/main.go
          go build -tags netgo -ldflags "$STATIC_LDFLAGS" -o "${OUTPUT_NAME}" ./cmd/ech0/main.go

      - name: List output files
        run: ls -lh .

      # --- Artifact Uploading ---
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ech0-${{ matrix.goos }}-${{ matrix.goarch }}-asset
          path: ech0-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  prepare-release:
    name: Prepare Release Package
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ech0-*
          path: ./backend-artifacts
          merge-multiple: true

      - name: Package binaries for release
        working-directory: ./backend-artifacts
        run: |
          set -euo pipefail
          for bin in ech0-linux-*; do
            [ -f "$bin" ] || continue
            chmod +x "$bin"
            tar -czf "${bin}.tar.gz" "$bin"
          done

      # ✅ 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./backend-artifacts/*.tar.gz
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: 🔄 Checkout source code
        uses: actions/checkout@v6

      - name: 📦 Download backend artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ech0-* # 下载后端构建产物（裸二进制：ech0-linux-amd64 / ech0-linux-arm64）
          path: ./backend-artifacts
          merge-multiple: true

      - name: 🐳 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 📦 Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: 📦 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 📦 Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ech0:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ech0:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/ech0:${{ github.ref_name }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/ech0:latest
