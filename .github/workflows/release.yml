name: Release with Embedded Frontend

on:
  push:
    tags:
      - "v*" # 触发条件：打 Tag，比如 v1.0.0

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARM64_TOOLCHAIN: "zigcc" # options: zigcc | musl
  ZIG_VERSION: "latest"
  MUSL_TOOLCHAIN_VERSION: "2025-6-20"
  MUSL_TOOLCHAIN_ARCHIVE: "aarch64-linux-musl-cross.tgz"
  MUSL_TOOLCHAIN_SHA256: ""

jobs:
  # Refuse to build a release when the tag (vX.Y.Z) and the Version constant
  # in internal/version/version.go disagree. Otherwise the published artifacts
  # would lie about their own version in /hello, /healthz, the About page, etc.
  verify-version:
    name: Verify tag matches internal/version.Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Compare tag and source version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          SRC_VERSION="$(grep -E '^[[:space:]]*Version[[:space:]]*=[[:space:]]*"' internal/version/version.go \
                          | head -n1 \
                          | sed -E 's/.*"([^"]+)".*/\1/')"

          if [ -z "$SRC_VERSION" ]; then
            echo "::error::Could not extract Version from internal/version/version.go"
            exit 1
          fi

          echo "tag        = ${TAG}"
          echo "tag_version = ${TAG_VERSION}"
          echo "src_version = ${SRC_VERSION}"

          if [ "$TAG_VERSION" != "$SRC_VERSION" ]; then
            echo "::error title=Version mismatch::Git tag ${TAG} → ${TAG_VERSION}, but internal/version/version.go declares ${SRC_VERSION}. Bump the const before tagging (see docs/dev/release-process.md)."
            exit 1
          fi

  build:
    name: Build Frontend & Backend
    needs: [verify-version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # --- Frontend Build Steps ---
      - name: Setup Node.js Environment
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"
      - name: Install dependencies and build frontend
        working-directory: ./web
        run: pnpm install --frozen-lockfile && pnpm build --mode production

      # --- Backend Build Steps ---
      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache-dependency-path: "**/go.sum"
      - name: Set Go proxy
        run: go env -w GOPROXY=https://proxy.golang.org,direct

      - name: Setup Zig for ARM64 Cross-compilation
        if: matrix.goarch == 'arm64' && env.ARM64_TOOLCHAIN == 'zigcc'
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Setup Musl for ARM64 Cross-compilation (fallback)
        if: matrix.goarch == 'arm64' && env.ARM64_TOOLCHAIN == 'musl'
        uses: ./.github/actions/setup-musl-toolchain
        with:
          toolchain-version: ${{ env.MUSL_TOOLCHAIN_VERSION }}
          archive-name: ${{ env.MUSL_TOOLCHAIN_ARCHIVE }}
          archive-sha256: ${{ env.MUSL_TOOLCHAIN_SHA256 }}

      - name: Build backend binary with embedded frontend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          ARM64_TOOLCHAIN: ${{ env.ARM64_TOOLCHAIN }}
        run: |
          set -euo pipefail
          # Define linker flags for a static build + inject commit / build time so /hello returns the real values.
          GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION_PKG="github.com/lin-snow/ech0/internal/version"
          STATIC_LDFLAGS="-linkmode external -extldflags '-static' -X ${VERSION_PKG}.Commit=${GIT_COMMIT} -X ${VERSION_PKG}.BuildTime=${BUILD_TIME}"
          OUTPUT_NAME="ech0-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            if [ "${ARM64_TOOLCHAIN}" = "zigcc" ]; then
              export CC="zig cc -target aarch64-linux-musl"
              export CXX="zig c++ -target aarch64-linux-musl"
            else
              export CC="aarch64-linux-musl-gcc"
            fi
            # sqlite-vec (asg017) 的 sqlite-vec.h 要 #include "sqlite3.h"，但 mattn/go-sqlite3
            # 把头改名为 sqlite3-binding.h、不对外暴露 sqlite3.h。amd64 原生 gcc 靠系统
            # libsqlite3-dev 的 /usr/include/sqlite3.h 兜底；musl 交叉编译的 sysroot 没有它。
            # 取 mattn 自带的头（版本与实际链接进二进制的 sqlite 完全一致）复制为 sqlite3.h。
            SQLITE_INC="${RUNNER_TEMP}/sqlite-include"
            mkdir -p "${SQLITE_INC}"
            # go list -m -f '{{.Dir}}' only resolves a path once the module is
            # extracted into the module cache; the build below would fetch it, but
            # that runs *after* this step, so download it explicitly first or .Dir
            # comes back empty and the cp targets '/sqlite3-binding.h'.
            go mod download github.com/mattn/go-sqlite3
            MATTN_DIR="$(go list -m -f '{{.Dir}}' github.com/mattn/go-sqlite3)"
            if [ -z "${MATTN_DIR}" ] || [ ! -f "${MATTN_DIR}/sqlite3-binding.h" ]; then
              echo "::error::could not locate go-sqlite3 header (MATTN_DIR='${MATTN_DIR}')" >&2
              exit 1
            fi
            cp "${MATTN_DIR}/sqlite3-binding.h" "${SQLITE_INC}/sqlite3.h"
            # musl 无 BSD 的 u_int*_t（sqlite-vec.c 在非 Win/wasm 分支硬 typedef 它们），映射到标准
            # 类型；-Wno-typedef-redefinition 消除随之的重复 typedef 警告；-fno-sanitize=undefined
            # 关掉 zig cc 默认插入、却未链接 runtime 的 UBSan（__ubsan_handle_* 未定义符号，release 不需要）。
            export CGO_CFLAGS="-I${SQLITE_INC} -Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t -Wno-typedef-redefinition -fno-sanitize=undefined"
          else
            export CC="gcc"
          fi

          # Build the binary. Go's 'embed' will automatically find the frontend
          # files built in the previous steps.
          test -f cmd/ech0/main.go
          go build -tags netgo -ldflags "$STATIC_LDFLAGS" -o "${OUTPUT_NAME}" ./cmd/ech0/main.go

      - name: List output files
        run: ls -lh .

      # --- Artifact Uploading ---
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ech0-${{ matrix.goos }}-${{ matrix.goarch }}-asset
          path: ech0-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  prepare-release:
    name: Prepare Release Package
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ech0-*
          path: ./backend-artifacts
          merge-multiple: true

      - name: Package binaries for release
        working-directory: ./backend-artifacts
        run: |
          set -euo pipefail
          for bin in ech0-linux-*; do
            [ -f "$bin" ] || continue
            chmod +x "$bin"
            tar -czf "${bin}.tar.gz" "$bin"
          done

      # ✅ 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ./backend-artifacts/*.tar.gz
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: 🔄 Checkout source code
        uses: actions/checkout@v7

      - name: 📦 Download backend artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ech0-* # 下载后端构建产物（裸二进制：ech0-linux-amd64 / ech0-linux-arm64）
          path: ./backend-artifacts
          merge-multiple: true

      - name: 🐳 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 📦 Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: 📦 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 📦 Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ech0:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ech0:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/ech0:${{ github.ref_name }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/ech0:latest
