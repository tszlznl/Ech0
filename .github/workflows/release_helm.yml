name: Release Helm Chart

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to sync appVersion (e.g. v4.4.4). Leave empty to use latest release."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release-helm:
    name: Publish Helm Repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate chart version metadata
        run: |
          set -euo pipefail
          chart_version="$(awk -F': ' '$1 == "version" {print $2}' charts/ech0/Chart.yaml | tr -d '"')"
          if [ -z "${chart_version}" ]; then
            echo "Chart version is empty in charts/ech0/Chart.yaml"
            exit 1
          fi
          echo "Detected chart version: ${chart_version}"

      - name: Sync chart appVersion from release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_EVENT: ${{ github.event.release.tag_name }}
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          release_tag=""
          if [ "${EVENT_NAME}" = "release" ] && [ -n "${RELEASE_TAG_EVENT}" ]; then
            release_tag="${RELEASE_TAG_EVENT}"
          elif [ -n "${RELEASE_TAG_INPUT}" ]; then
            release_tag="${RELEASE_TAG_INPUT}"
          else
            release_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          fi

          if [ -z "${release_tag}" ]; then
            echo "Failed to resolve release tag for appVersion sync."
            exit 1
          fi

          app_version="${release_tag#v}"
          if [ -z "${app_version}" ]; then
            echo "Resolved empty appVersion from release tag: ${release_tag}"
            exit 1
          fi

          sed -i -E 's/^appVersion: .*/appVersion: "'"${app_version}"'"/' charts/ech0/Chart.yaml
          echo "Synced appVersion to ${app_version} from tag ${release_tag}"

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      # charts_dir must be the parent of chart folders (each subdir contains Chart.yaml), not the chart path itself.
      - name: Run Chart Releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: ./charts
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p _site
          release_rows_file="$(mktemp)"

          gh release list --limit 100 --exclude-drafts --exclude-pre-releases --json tagName,publishedAt > /tmp/releases.json

          python3 - "${release_rows_file}" <<'PY'
          import json
          import sys

          output_file = sys.argv[1]

          with open("/tmp/releases.json", "r", encoding="utf-8") as f:
              releases = json.load(f)

          def version_tuple(tag):
              if not tag.startswith("v"):
                  return None
              parts = tag[1:].split(".")
              if len(parts) != 3:
                  return None
              try:
                  return tuple(int(p) for p in parts)
              except ValueError:
                  return None

          rows = []
          for r in releases:
              tag = r.get("tagName", "")
              vt = version_tuple(tag)
              if vt is None or vt < (4, 4, 0):
                  continue
              published_at = r.get("publishedAt") or ""
              date = published_at[:10]
              base = f"https://github.com/lin-snow/Ech0/releases/download/{tag}"
              page = f"https://github.com/lin-snow/Ech0/releases/tag/{tag}"
              rows.append(
                  f'<li><strong>{tag}</strong> <span class="muted">({date})</span> - '
                  f'<a href="{base}/ech0-linux-amd64.tar.gz">linux/amd64</a> | '
                  f'<a href="{base}/ech0-linux-arm64.tar.gz">linux/arm64</a> | '
                  f'<a href="{page}">Release Notes</a></li>'
              )

          with open(output_file, "w", encoding="utf-8") as out:
              if not rows:
                  out.write('<li class="muted">No published release found for v4.4.0+.</li>\n')
              else:
                  for row in rows:
                      out.write(f"{row}\n")
          PY

          awk -v rows_file="${release_rows_file}" '
            /<!-- RELEASES -->/ {
              while ((getline line < rows_file) > 0) {
                print "          " line
              }
              close(rows_file)
              next
            }
            { print }
          ' release/index.html.tmpl > _site/index.html

          cp docs/imgs/logo.svg _site/logo.svg
          cp web/public/favicon.svg _site/favicon.svg
          touch _site/.nojekyll

      - name: Deploy release page to gh-pages
        run: |
          set -euo pipefail

          tmpdir="$(mktemp -d)"
          cleanup() {
            git worktree remove "$tmpdir" --force 2>/dev/null || true
            rm -rf "$tmpdir"
          }
          trap cleanup EXIT

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --no-tags origin gh-pages
            git worktree add --detach "$tmpdir" origin/gh-pages
          else
            git worktree add --detach "$tmpdir"
            (
              cd "$tmpdir"
              git checkout --orphan gh-pages
              rm -rf ./*
            )
          fi

          cp _site/index.html "$tmpdir/index.html"
          cp _site/logo.svg "$tmpdir/logo.svg"
          cp _site/favicon.svg "$tmpdir/favicon.svg"
          cp _site/.nojekyll "$tmpdir/.nojekyll"

          # Bootstrap Helm repo index when chart-releaser skips publishing
          # (for example, no chart version change detected) and index.yaml is absent.
          if [ ! -f "$tmpdir/index.yaml" ]; then
            echo "index.yaml missing on gh-pages, bootstrapping from local chart package..."
            bootstrap_dir="$(mktemp -d)"
            helm package charts/ech0 --destination "$bootstrap_dir"
            helm repo index "$bootstrap_dir" --url "https://lin-snow.github.io/Ech0"
            cp "$bootstrap_dir/index.yaml" "$tmpdir/index.yaml"
            cp "$bootstrap_dir"/ech0-*.tgz "$tmpdir/"
          fi

          # Remove stale local chart packages from gh-pages.
          # Keep only files still referenced by index.yaml local URLs.
          python3 - "$tmpdir/index.yaml" "$tmpdir" <<'PY'
          import re
          import sys
          from pathlib import Path

          index_path = Path(sys.argv[1])
          pages_dir = Path(sys.argv[2])

          if not index_path.exists():
              sys.exit(0)

          content = index_path.read_text(encoding="utf-8")
          referenced = set(re.findall(r'ech0-[0-9A-Za-z_.-]+\.tgz', content))

          for pkg in pages_dir.glob("ech0-*.tgz"):
              if pkg.name not in referenced:
                  pkg.unlink()
                  print(f"Removed stale chart package: {pkg.name}")
          PY

          # Keep gh-pages as a publish-only minimal branch.
          # Remove any unrelated files carried over from historical main snapshots.
          python3 - "$tmpdir/index.yaml" "$tmpdir" <<'PY'
          import re
          import shutil
          import sys
          from pathlib import Path

          index_path = Path(sys.argv[1])
          pages_dir = Path(sys.argv[2])

          keep_files = {
              ".nojekyll",
              "index.html",
              "index.yaml",
              "logo.svg",
              "favicon.svg",
          }

          # Keep local chart packages only when referenced by index.yaml.
          if index_path.exists():
              content = index_path.read_text(encoding="utf-8")
              keep_files.update(re.findall(r'ech0-[0-9A-Za-z_.-]+\.tgz', content))

          for child in pages_dir.iterdir():
              if child.name == ".git":
                  continue
              if child.name in keep_files:
                  continue
              if child.is_dir():
                  shutil.rmtree(child)
              else:
                  child.unlink()
              print(f"Pruned unrelated gh-pages item: {child.name}")
          PY

          (
            cd "$tmpdir"
            git add index.html logo.svg favicon.svg .nojekyll index.yaml
            shopt -s nullglob
            chart_pkgs=(ech0-*.tgz)
            if [ "${#chart_pkgs[@]}" -gt 0 ]; then
              git add "${chart_pkgs[@]}"
            fi
            if git diff --cached --quiet; then
              echo "Release page unchanged; skip commit."
              exit 0
            fi
            git commit -m "docs: update gh-pages release index"
            git push origin HEAD:gh-pages
          )

      - name: Write post-release validation checklist
        run: |
          {
            echo "## Helm Repo validation checklist"
            echo ""
            echo "- [ ] Verify release page is available at \`https://lin-snow.github.io/Ech0/\`"
            echo "- [ ] Verify gh-pages branch contains \`.nojekyll\` and \`index.yaml\`"
            echo "- [ ] Verify release has chart package \`ech0-<version>.tgz\`"
            echo "- [ ] Verify install works:"
            echo "  \`\`\`bash"
            echo "  helm repo add ech0 https://lin-snow.github.io/Ech0"
            echo "  helm repo update"
            echo "  helm install ech0 ech0/ech0"
            echo "  \`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
