# Deploy hub/ (Vue + Vite PWA) to Cloudflare Pages -> hub.ech0.app
# hub imports from ../web/src (vite alias) and its prebuild runs
# `npm install --prefix ../web`, so the full repo checkout + web/ must be present.
name: Deploy hub

on:
  push:
    branches: [main]
    paths:
      - "hub/**"
      - "web/**"
      - ".github/workflows/deploy-hub.yml"
  workflow_dispatch:

concurrency:
  group: deploy-hub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: "pnpm"
          cache-dependency-path: "hub/pnpm-lock.yaml"

      - name: Install hub deps
        working-directory: hub
        run: pnpm install --frozen-lockfile

      # `pnpm build` runs the prebuild step, which generates SEO assets and
      # installs ../web (via `npm install --prefix ../web`) so vue-tsc can
      # resolve the ../web/src imports.
      - name: Build
        working-directory: hub
        run: pnpm build

      # Explicit wrangler invocation (errors are visible, version pinned to v4).
      # `project create` is idempotent: it no-ops if the project already exists.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm dlx wrangler@4 pages project create ech0app-hub --production-branch=main 2>/dev/null || true
          pnpm dlx wrangler@4 pages deploy hub/dist --project-name=ech0app-hub --branch=main
