name: Build with Zig CC

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"
  NODE_VERSION: "25"
  ZIG_VERSION: "latest"

jobs:
  build-zig-matrix:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} with zig cc
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            zig_target: x86_64-linux-musl
            output_suffix: ""
          - goos: linux
            goarch: arm64
            zig_target: aarch64-linux-musl
            output_suffix: ""
          - goos: linux
            goarch: riscv64
            zig_target: riscv64-linux-musl
            output_suffix: ""
          - goos: linux
            goarch: arm
            goarm: "7"
            zig_target: arm-linux-musleabihf
            output_suffix: ""
          - goos: linux
            goarch: "386"
            zig_target: x86-linux-musl
            output_suffix: ""
          - goos: linux
            goarch: loong64
            zig_target: loongarch64-linux-musl
            output_suffix: ""
          - goos: windows
            goarch: amd64
            zig_target: x86_64-windows-gnu
            output_suffix: ".exe"
          - goos: windows
            goarch: arm64
            zig_target: aarch64-windows-gnu
            output_suffix: ".exe"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Install dependencies and build frontend
        working-directory: ./web
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile || pnpm install --fix-lockfile --no-frozen-lockfile
          pnpm build --mode production

      - name: Verify embedded template assets
        run: |
          set -euo pipefail
          test -d template/dist
          test -n "$(ls -A template/dist)"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"

      - name: Set Go proxy
        run: go env -w GOPROXY=https://proxy.golang.org,direct

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build backend binary (zig cc)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 1
          ZIG_TARGET: ${{ matrix.zig_target }}
        run: |
          set -euo pipefail
          test -f cmd/ech0/main.go
          STATIC_LDFLAGS="-linkmode external -extldflags '-static'"
          OUTPUT_NAME="ech0-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.output_suffix }}"
          export CC="zig cc -target ${ZIG_TARGET}"
          export CXX="zig c++ -target ${ZIG_TARGET}"
          go build -tags netgo -ldflags "$STATIC_LDFLAGS" -o "${OUTPUT_NAME}" ./cmd/ech0/main.go

      - name: Verify binary metadata
        run: |
          set -euo pipefail
          OUTPUT_NAME="ech0-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.output_suffix }}"
          file "${OUTPUT_NAME}" | tee /tmp/binary-file-info.txt
          if [ "${{ matrix.goos }}" = "linux" ]; then
            case "${{ matrix.goarch }}" in
              amd64) grep -Eqi "x86-64|x86_64" /tmp/binary-file-info.txt ;;
              "386") grep -Eqi "Intel 80386|i386" /tmp/binary-file-info.txt ;;
              arm64) grep -Eqi "ARM aarch64|aarch64" /tmp/binary-file-info.txt ;;
              arm) grep -Eqi "ARM" /tmp/binary-file-info.txt ;;
              riscv64) grep -Eqi "RISC-V" /tmp/binary-file-info.txt ;;
              loong64) grep -Eqi "LoongArch" /tmp/binary-file-info.txt ;;
            esac
            ldd "${OUTPUT_NAME}" 2>&1 | tee /tmp/binary-ldd-info.txt || true
            grep -Eqi "not a dynamic executable|statically linked" /tmp/binary-ldd-info.txt
          else
            grep -Eqi "PE32\+|Windows" /tmp/binary-file-info.txt
          fi

      - name: Package binary
        run: |
          set -euo pipefail
          OUTPUT_NAME="ech0-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.output_suffix }}"
          tar -czf "ech0-${{ matrix.goos }}-${{ matrix.goarch }}-zigcc.tar.gz" "${OUTPUT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ech0-${{ matrix.goos }}-${{ matrix.goarch }}-zigcc-asset
          path: ech0-${{ matrix.goos }}-${{ matrix.goarch }}-zigcc.tar.gz
          retention-days: 3
