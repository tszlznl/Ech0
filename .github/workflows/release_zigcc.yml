name: Build with Zig CC

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"
  NODE_VERSION: "25"
  ZIG_VERSION: "0.15.2"

jobs:
  build-zig-arm64:
    name: Build linux/arm64 with zig cc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Install dependencies and build frontend
        working-directory: ./web
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile || pnpm install --fix-lockfile --no-frozen-lockfile
          pnpm build --mode production

      - name: Verify embedded template assets
        run: |
          set -euo pipefail
          test -d template/dist
          test -n "$(ls -A template/dist)"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"

      - name: Set Go proxy
        run: go env -w GOPROXY=https://proxy.golang.org,direct

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build backend binary (zig cc)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: zig cc -target aarch64-linux-musl
          CXX: zig c++ -target aarch64-linux-musl
        run: |
          set -euo pipefail
          test -f cmd/ech0/main.go
          STATIC_LDFLAGS="-linkmode external -extldflags '-static'"
          OUTPUT_NAME="ech0-linux-arm64-zigcc"
          go build -tags netgo -ldflags "$STATIC_LDFLAGS" -o "${OUTPUT_NAME}" ./cmd/ech0/main.go

      - name: Verify binary metadata
        run: |
          set -euo pipefail
          OUTPUT_NAME="ech0-linux-arm64-zigcc"
          file "${OUTPUT_NAME}" | tee /tmp/binary-file-info.txt
          grep -qi "ARM aarch64" /tmp/binary-file-info.txt
          ldd "${OUTPUT_NAME}" 2>&1 | tee /tmp/binary-ldd-info.txt || true
          grep -Eqi "not a dynamic executable|statically linked" /tmp/binary-ldd-info.txt

      - name: Package binary
        run: |
          set -euo pipefail
          tar -czf "ech0-linux-arm64-zigcc.tar.gz" "ech0-linux-arm64-zigcc"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ech0-linux-arm64-zigcc-asset
          path: ech0-linux-arm64-zigcc.tar.gz
          retention-days: 3

      - name: Write cutover checklist
        run: |
          {
            echo "## Zig cc cutover checklist"
            echo ""
            echo "- [x] linux/arm64 build succeeded with \`zig cc -target aarch64-linux-musl\`"
            echo "- [x] Output binary passed architecture/static-link verification"
            echo "- [ ] Run this workflow repeatedly and confirm stability"
            echo "- [ ] Compare runtime behavior with current musl-gcc build"
            echo "- [ ] If all checks pass, migrate ARM64 release workflow to zig cc"
          } >> "$GITHUB_STEP_SUMMARY"
