# 使用模板「登记到 Ech0 Hub」开 Issue 并带上标签 hub 时，
# 解析 Instance ID / Instance URL，更新 hub/public/hub.json 并自动开 PR（需维护者合并）。
name: Hub register from issue

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: '需要处理的 Issue 编号（例如 123）'
        required: true
        type: string

jobs:
  update-hub-json:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'hub')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Parse issue and update hub.json
        id: hub
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const core = require('@actions/core');

            const hubPath = 'hub/public/hub.json';
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number(core.getInput('issue_number'))
              : context.issue.number;

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.setFailed('invalid issue_number input');
              return;
            }

            let issue;
            if (context.eventName === 'workflow_dispatch') {
              const resp = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              issue = resp.data;
              if (!Array.isArray(issue.labels) || !issue.labels.some((l) => l.name === 'hub')) {
                core.setFailed('target issue does not have hub label');
                return;
              }
            } else {
              issue = context.payload.issue;
            }

            const body = issue.body || '';

            const idRe = /### Instance ID\s*\r?\n+\s*([^\n#]+)/;
            const urlRe = /### Instance URL\s*\r?\n+\s*([^\n#]+)/;
            const m1 = body.match(idRe);
            const m2 = body.match(urlRe);

            const failComment = async (msg) => {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: msg,
              });
            };

            if (!m1 || !m2) {
              await failComment(
                '无法从正文中解析 **Instance ID** 或 **Instance URL**。请使用模板「登记到 Ech0 Hub」填写，且不要删除 `###` 标题行。'
              );
              core.setFailed('parse');
              return;
            }

            const instanceId = m1[1].trim();
            let instanceUrl = m2[1].trim().replace(/\/+$/, '');

            if (!/^[\-a-z0-9]+$/.test(instanceId) || instanceId.length < 1 || instanceId.length > 64) {
              await failComment(
                '**Instance ID** 仅允许小写字母、数字与连字符，长度 1–64。'
              );
              core.setFailed('invalid id');
              return;
            }

            let parsed;
            try {
              parsed = new URL(instanceUrl);
            } catch {
              await failComment('**Instance URL** 不是合法 URL。');
              core.setFailed('invalid url');
              return;
            }

            if (parsed.protocol !== 'https:') {
              await failComment('**Instance URL** 须使用 `https://`。');
              core.setFailed('https only');
              return;
            }

            let data = { instances: [] };
            if (fs.existsSync(hubPath)) {
              data = JSON.parse(fs.readFileSync(hubPath, 'utf8'));
            }
            if (!Array.isArray(data.instances)) {
              data.instances = [];
            }

            const dup = data.instances.some(
              (i) => i.id === instanceId || i.url === instanceUrl
            );
            if (dup) {
              await failComment(
                '`hub.json` 中已存在相同的 **Instance ID** 或 **Instance URL**，未创建 PR。'
              );
              core.setOutput('changed', 'false');
              return;
            }

            data.instances.push({ id: instanceId, url: instanceUrl });
            data.instances.sort((a, b) => a.id.localeCompare(b.id));

            fs.mkdirSync('hub/public', { recursive: true });
            fs.writeFileSync(hubPath, JSON.stringify(data, null, 2) + '\n');

            core.setOutput('changed', 'true');
            core.setOutput('instance_id', instanceId);
            core.setOutput('issue_number', String(issueNumber));

      - name: Create pull request
        id: cpr
        if: steps.hub.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(hub): add instance ${{ steps.hub.outputs.instance_id }} (#${{ steps.hub.outputs.issue_number }})'
          title: 'chore(hub): add instance ${{ steps.hub.outputs.instance_id }} (#${{ steps.hub.outputs.issue_number }})'
          body: |
            由 #${{ steps.hub.outputs.issue_number }} 自动发起。

            - [ ] 维护者确认 CORS 与实例可访问后再合并。
          branch: hub/issue-${{ steps.hub.outputs.issue_number }}
          delete-branch: true
          labels: hub
          add-paths: |
            hub/public/hub.json

      - name: Comment with PR link
        if: steps.hub.outputs.changed == 'true' && steps.cpr.outputs.pull-request-url != ''
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          ISSUE_NUMBER: ${{ steps.hub.outputs.issue_number }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `已创建 PR：${process.env.PR_URL}\n\n维护者审核合并后，实例会出现在 Hub 列表中。`,
            });
