name: Build Docker Test Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签（留空自动生成 test-<run>-<sha7>）"
        required: false
        type: string
      push_test_latest:
        description: "额外推送 test-latest 标签"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-frontend:
    name: Build frontend assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        working-directory: ./web
        run: pnpm install --frozen-lockfile && pnpm build --mode production

      - name: Prepare embedded template assets
        run: |
          set -euo pipefail
          mkdir -p template/dist
          cp -R web/dist/. template/dist/

      - name: Upload template assets
        uses: actions/upload-artifact@v7
        with:
          name: template-dist-asset
          path: template/dist
          retention-days: 1

  build-backend:
    name: Build backend (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Set Go proxy
        run: go env -w GOPROXY=https://proxy.golang.org,direct

      - name: Setup musl.cc toolchain for ARM64
        if: matrix.goarch == 'arm64'
        run: |
          wget -q https://github.com/lin-snow/musl-compilers/releases/download/2025-6-20/aarch64-linux-musl-cross.tgz
          tar -xf aarch64-linux-musl-cross.tgz
          echo "$(pwd)/aarch64-linux-musl-cross/bin" >> "$GITHUB_PATH"

      - name: Download template assets
        uses: actions/download-artifact@v8
        with:
          name: template-dist-asset
          path: template/dist

      - name: Build backend binary
        run: |
          set -euo pipefail
          mkdir -p dist
          STATIC_LDFLAGS="-linkmode external -extldflags '-static'"

          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            CC=aarch64-linux-musl-gcc GOOS=linux GOARCH=arm64 CGO_ENABLED=1 \
              go build -tags netgo -ldflags "$STATIC_LDFLAGS" -o dist/ech0-linux-arm64 ./cmd/ech0/main.go
          else
            GOOS=linux GOARCH=amd64 CGO_ENABLED=1 \
              go build -tags netgo -ldflags "$STATIC_LDFLAGS" -o dist/ech0-linux-amd64 ./cmd/ech0/main.go
          fi

      - name: Package backend binary
        run: |
          set -euo pipefail
          cd dist
          tar -czf ech0-linux-${{ matrix.goarch }}.tar.gz ech0-linux-${{ matrix.goarch }}

      - name: Upload backend artifact
        uses: actions/upload-artifact@v7
        with:
          name: ech0-linux-${{ matrix.goarch }}-asset
          path: dist/ech0-linux-${{ matrix.goarch }}.tar.gz
          retention-days: 1

  build-and-push-image:
    name: Build and push test image
    runs-on: ubuntu-latest
    needs: [build-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download backend artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ech0-linux-*-asset
          path: ./backend-artifacts
          merge-multiple: true

      - name: Set image and tags
        id: meta
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/ech0"
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="test-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi

          {
            echo "image=${IMAGE}"
            echo "tag=${TAG}"
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            if [ "${{ inputs.push_test_latest }}" = "true" ]; then
              echo "${IMAGE}:test-latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Print pull command
        run: |
          echo "### Docker image for testing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pull: \`docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
