name: Build Docker Test Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签（留空自动生成 test-<run>-<sha7>）"
        required: false
        type: string
      push_test_latest:
        description: "额外推送 test-latest 标签"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  MUSL_TOOLCHAIN_VERSION: "2025-6-20"
  MUSL_TOOLCHAIN_ARCHIVE: "aarch64-linux-musl-cross.tgz"
  MUSL_TOOLCHAIN_SHA256: ""

jobs:
  build:
    name: Build backend (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies and build frontend
        working-directory: ./web
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile || pnpm install --fix-lockfile --no-frozen-lockfile
          pnpm build --mode production

      - name: Verify embedded template assets
        run: |
          set -euo pipefail
          test -d template/dist
          test -n "$(ls -A template/dist)"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
          cache-dependency-path: "**/go.sum"

      - name: Set Go proxy
        run: go env -w GOPROXY=https://proxy.golang.org,direct

      - name: Setup musl.cc toolchain for ARM64
        if: matrix.goarch == 'arm64'
        uses: ./.github/actions/setup-musl-toolchain
        with:
          toolchain-version: ${{ env.MUSL_TOOLCHAIN_VERSION }}
          archive-name: ${{ env.MUSL_TOOLCHAIN_ARCHIVE }}
          archive-sha256: ${{ env.MUSL_TOOLCHAIN_SHA256 }}

      - name: Build backend binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-musl-gcc' || 'gcc' }}
        run: |
          set -euo pipefail
          test -f cmd/ech0/main.go
          STATIC_LDFLAGS="-linkmode external -extldflags '-static'"
          OUTPUT_NAME="ech0-linux-${{ matrix.goarch }}"
          go build -tags netgo -ldflags "$STATIC_LDFLAGS" -o "${OUTPUT_NAME}" ./cmd/ech0/main.go

      - name: Package backend binary
        run: |
          set -euo pipefail
          tar -czf "ech0-linux-${{ matrix.goarch }}.tar.gz" "ech0-linux-${{ matrix.goarch }}"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v7
        with:
          name: ech0-linux-${{ matrix.goarch }}-asset
          path: ech0-linux-${{ matrix.goarch }}.tar.gz
          retention-days: 1

  build-and-push-image:
    name: Build and push test image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download backend artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ech0-linux-*-asset
          path: ./backend-artifacts
          merge-multiple: true

      - name: Set image and tags
        id: meta
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LC}/ech0"
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="test-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi

          {
            echo "image=${IMAGE}"
            echo "tag=${TAG}"
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            if [ "${{ inputs.push_test_latest }}" = "true" ]; then
              echo "${IMAGE}:test-latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Print pull command
        run: |
          echo "### Docker image for testing" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pull: \`docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
