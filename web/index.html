<!doctype html>
<html lang="zh-CN" class="app-loading">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- OpenGraph Meta Tags -->
    <meta property="og:title" content="Ech0" />
    <meta
      property="og:description"
      content="Ech0 is an open-source platform for quickly sharing thoughts, text, and links with full data control."
    />
    <meta property="og:image" content="/Ech0.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ech0" />

    <link rel="alternate" type="application/atom+xml" title="Ech0 Atom Feed" href="/rss" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android Chrome Icons -->
    <link rel="icon" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" sizes="512x512" href="/android-chrome-512x512.png" />

    <!-- Additional Favicon sizes -->
    <link rel="icon" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/app.webmanifest" />
    <meta name="theme-color" content="#f4f1ec" />
    <meta
      name="description"
      content="Ech0 is a new-generation open-source self-hosted platform designed for individual users. It is ultra-lightweight and low-cost, helping you easily publish and share ideas, writings, and links. With a clean, intuitive interface and powerful command-line tools, content management becomes simple and flexible. Your data is fully owned and controlled by you."
    />
    <meta
      name="keywords"
      content="Ech0, open-source, sharing, thoughts, text, links, privacy, data control, platform, web app"
    />
    <meta name="author" content="Ech0 Team" />

    <title>Ech0</title>

    <link preload rel="stylesheet" href="/src/assets/main.css" />

    <link rel="stylesheet" href="/others/styles/APlayer.min.css" />
    <script src="/others/scripts/APlayer.min.js"></script>
    <!-- require MetingJS -->
    <script src="/others/scripts/Meting.min.js"></script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ech0",
        "url": "https://github.com/lin-snow/Ech0",
        "description": "A next-generation open-source, self-hosted, lightweight publishing platform focused on personal idea sharing.",
        "publisher": {
          "@type": "Organization",
          "name": "Ech0 Team"
        },
        "sameAs": ["https://github.com/lin-snow/Ech0"]
      }
    </script>

    <!-- Canonical -->
    <link rel="canonical" href="https://lin-snow.github.io/Ech0/" />

    <style>
      html.app-loading,
      html.app-loading body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-content: center;
        gap: 12px;
        color: #f0d3a8;
        background: radial-gradient(circle at 30% 20%, #4a3b2e 0%, #1c1d26 55%, #13141b 100%);
        transition:
          opacity 0.28s ease,
          visibility 0.28s ease;
      }

      #app-loader p {
        margin: 0;
        text-align: center;
        font-size: 14px;
        letter-spacing: 0.04em;
      }

      #app-loader.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      #app-loader .loader {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.18);
        border-top-color: #f6b56a;
        animation: app-loader-spin 0.9s linear infinite;
        margin: 0 auto;
      }

      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <div id="app-loader">
      <div class="loader"></div>
      <p>加载中...</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
