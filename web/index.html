  <head>

    />

    <link rel="alternate" type="application/atom+xml" title="Ech0 Atom Feed" href="/rss" />

    <!-- Favicon -->

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android Chrome Icons -->
    <link rel="icon" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" sizes="512x512" href="/android-chrome-512x512.png" />

    <!-- Additional Favicon sizes -->
    <link rel="icon" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/app.webmanifest" />
    <meta name="theme-color" content="#f4f1ec" />

      name="description"
      content="Ech0 is a new-generation open-source self-hosted platform designed for individual users. It is ultra-lightweight and low-cost, helping you easily publish and share ideas, writings, and links. With a clean, intuitive interface and powerful command-line tools, content management becomes simple and flexible. Your data is fully owned and controlled by you."
    />
    <meta
      name="keywords"
      content="Ech0, open-source, sharing, thoughts, text, links, privacy, data control, platform, web app"
    />
    <meta name="author" content="Ech0 Team" />

    <title>Ech0</title>

    <link preload rel="stylesheet" href="/src/assets/main.css" />

    <link rel="stylesheet" href="/others/styles/APlayer.min.css" />
    <script src="/others/scripts/APlayer.min.js"></script>
    <!-- require MetingJS -->
    <script src="/others/scripts/Meting.min.js"></script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ech0",
        "url": "https://github.com/lin-snow/Ech0",
        "description": "A next-generation open-source, self-hosted, lightweight publishing platform focused on personal idea sharing.",
        "publisher": {
          "@type": "Organization",
          "name": "Ech0 Team"
        },
        "sameAs": ["https://github.com/lin-snow/Ech0"]
      }
    </script>

    <!-- Canonical -->
    <link rel="canonical" href="https://lin-snow.github.io/Ech0/" />
    <style>
      html.app-loading,
      html.app-loading body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-content: center;
        gap: 14px;
        color: #8a6643;
        background:
          radial-gradient(1200px 680px at 14% 12%, rgba(212, 173, 131, 0.42), transparent 58%),
          radial-gradient(900px 560px at 86% 80%, rgba(194, 161, 126, 0.3), transparent 58%),
          linear-gradient(135deg, #f7f3ec 0%, #f1e8da 52%, #efe5d6 100%);
        transition:
          opacity 0.28s ease,
          visibility 0.28s ease;
      }

      #app-loader::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          repeating-linear-gradient(
            90deg,
            transparent 0,
            transparent 13px,
            rgba(129, 97, 65, 0.03) 14px
          ),
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 13px,
            rgba(129, 97, 65, 0.025) 14px
          );
        pointer-events: none;
      }

      .loader-shell {
        width: 90px;
        height: 90px;
        margin: 0 auto;
        position: relative;
      }

      .loader-widget-smile {
        position: absolute;
        inset: 50%;
        width: 60px;
        height: 60px;
        transform: translate(-50%, -50%);
        color: #8b8b8b;
        filter: drop-shadow(0 6px 12px rgba(146, 102, 59, 0.14));
      }

      .loader-widget-smile::before {
        content: '';
        position: absolute;
        inset: -10px;
        border-radius: 999px;
        border: 1px dashed rgba(177, 130, 84, 0.3);
        animation: smile-spin 3.4s linear infinite;
      }

      .loader-widget-smile svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        animation: smile-spin 1.2s linear infinite;
      }

      #app-loader .loader-brand {
        margin: 0;
        text-align: center;
        font-family: 'Iowan Old Style', 'Palatino Linotype', 'Noto Serif SC', ui-serif, Georgia, serif;
        font-size: 42px;
        line-height: 1;
        letter-spacing: 0.06em;
        color: #7a5436;
        text-shadow: 0 6px 24px rgba(139, 99, 58, 0.2);
        animation: brand-fade-up 0.9s ease-out both;
      }

      #app-loader p {
        margin: 0;
        text-align: center;
        font-family:
          'Avenir Next', 'SF Pro Text', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei',
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue',
          Arial, 'Noto Sans', sans-serif;
        font-size: 12px;
        letter-spacing: 0.16em;
        color: rgba(124, 93, 62, 0.82);
      }

      #app-loader p::after {
        content: '...';
        display: inline-block;
        width: 1.2em;
        overflow: hidden;
        vertical-align: bottom;
        animation: dots 1.5s steps(4, end) infinite;
      }

      #app-loader.fade-out {
        opacity: 0;
        visibility: hidden;
      }

      @keyframes smile-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes brand-fade-up {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes dots {
        from {
          width: 0;
        }
        to {
          width: 1.2em;
        }
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <div id="app-loader">
      <div class="loader-shell" aria-hidden="true">
        <div class="loader-widget-smile">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g fill="none" stroke="#888888" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
              <path
                d="M12 3c4.97 0 9 4.03 9 9c0 4.97 -4.03 9 -9 9c-4.97 0 -9 -4.03 -9 -9c0 -4.97 4.03 -9 9 -9"
              />
              <path d="M9 9v1" />
              <path d="M15 9v1" />
              <path d="M8 14c0.5 1.5 1.79 3 4 3c2.21 0 3.5 -1.5 4 -3" />
            </g>
          </svg>
        </div>
      </div>
      <h1 class="loader-brand">Ech0</h1>
      <p>静候灵感落笔</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
